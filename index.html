<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>La Tribu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;0,700;1,500;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root{
  --cream:#FBF7F1; --paper:#FFFFFF; --ink:#2B2420; --ink-soft:#6B6058;
  --terracota:#C1662F; --terracota-soft:#F1DDCB; --sage:#6B8F71; --sage-soft:#E3EDE3;
  --gold:#D9A441; --line:#E9E1D6; --danger:#C1462F; --radius:16px;
  /* Sistema de diseño LATRIBU: anillo de ritmo (mañana/tarde/noche) y temas de módulo */
  --ring-morning:#D9A441; --ring-afternoon:#5B7A4E; --ring-evening:#8A5FA0;
  --bg-neutral:#F5F1E9; --line-neutral:#E7DFC9; --accent-neutral:#B8935A;
  --bg-green:#EFF5E8; --line-green:#D9E4CE; --accent-green:#5B7A4E;
}
.theme-neutral{ --tint:var(--bg-neutral); --tint-line:var(--line-neutral); --accent:var(--accent-neutral); }
.theme-green{ --tint:var(--bg-green); --tint-line:var(--line-green); --accent:var(--accent-green); }
*{box-sizing:border-box;}
body{margin:0;font-family:'Inter',sans-serif;background:var(--cream);color:var(--ink);}
h1,h2,h3,.serif{font-family:'Fraunces',serif;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}
.hidden{display:none !important;}
.field.invalid label{color:var(--danger);}
.field.invalid input,.field.invalid select,.field.invalid textarea{border-color:var(--danger);}
.field-icon{display:inline-flex;align-items:center;justify-content:center;margin-right:6px;color:#5B7A4E;flex-shrink:0;}
.slider-field{background:#FFFFFF;border:1px solid #E7DFC9;border-radius:12px;padding:14px 16px;}
.slider-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.slider-top .slider-label{display:inline-flex;align-items:center;font-size:12px;font-weight:600;color:#2B2621;}
.slider-value{font-family:'Fraunces',serif;font-weight:700;font-size:18px;color:#5B7A4E;}
.slider-field input[type="range"]{width:100%;accent-color:#5B7A4E;}
.slider-scale{display:flex;justify-content:space-between;font-size:9px;color:#B0A99C;margin-top:4px;}
.time-field,.select-field{background:#FFFFFF;border:1px solid #E7DFC9;border-radius:12px;height:48px;box-sizing:border-box;display:flex;align-items:center;justify-content:space-between;padding:0 14px;}
.time-field input{border:none;background:transparent;font-weight:600;color:#2B2621;font-size:15px;width:100%;height:100%;padding:0;}
.time-field input::-webkit-calendar-picker-indicator{display:none;-webkit-appearance:none;}
.time-field input::-webkit-clear-button,.time-field input::-webkit-inner-spin-button{display:none;}
.select-field{position:relative;padding:0;}
.select-field select{width:100%;height:100%;appearance:none;-webkit-appearance:none;background:transparent;border:none;padding:0 34px 0 14px;font-size:15px;color:#2B2621;}
.select-field .select-arrow{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:#B0A99C;pointer-events:none;font-size:12px;}
/* ---- Segmentado (rango corto y conocido) ---- */
.segmented-group{display:flex;height:48px;gap:6px;}
.segmented-cell{flex:1;height:100%;border-radius:12px;border:1px solid #E7DFC9;background:#FFFFFF;font-family:'Fraunces',serif;font-weight:600;font-size:14px;color:#8A8377;cursor:pointer;transition:background .15s ease, color .15s ease, border-color .15s ease;}
.segmented-cell.selected{background:#2B2621;border-color:#2B2621;color:#F3EFE6;}
/* ---- Chevron discreto (conteo abierto o con decimales) ---- */
.chevron-field{height:48px;box-sizing:border-box;display:flex;align-items:center;justify-content:space-between;border:1px solid #E7DFC9;border-radius:12px;background:#FFFFFF;padding:0 16px;}
.chevron-value{font-family:'Fraunces',serif;font-weight:700;font-size:18px;color:#2B2621;}
.chevron-stack{display:flex;flex-direction:column;gap:0;}
.chevron-btn{border:none;background:none;padding:0;line-height:1;font-size:11px;color:#B0A99C;cursor:pointer;}
.chevron-btn:hover{color:#5B7A4E;}
#module-fields.grid-2{gap:22px 28px;}
.accordion{border:1px solid var(--line);border-radius:18px;overflow:hidden;background:var(--paper);}
.accordion-item{border-bottom:1px solid var(--line);}
.accordion-item:last-child{border-bottom:none;}
.accordion-header{width:100%;text-align:left;padding:16px 18px;background:var(--cream);border:none;cursor:pointer;font-weight:700;display:flex;justify-content:space-between;align-items:center;font-size:15px;}
.accordion-content{display:none;padding:18px 18px 12px;background:var(--paper);}
.accordion-content.active{display:block;}
.accordion-toggle{font-size:14px;color:var(--accent, var(--terracota));}
.conditional-hidden{display:none !important;}

.field{margin-bottom:18px;}
.field label{display:flex;align-items:center;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--ink-soft);}
.field input, .field select, .field textarea{width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--line);background:var(--cream);font-size:15px;}
.field select{-webkit-appearance:none;-moz-appearance:none;appearance:none;}
.field input:focus, .field select:focus, .field textarea:focus{outline:2px solid var(--terracota);outline-offset:1px;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 22px;border-radius:999px;border:none;font-weight:600;font-size:15px;transition:transform .15s ease;}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--accent, var(--terracota));color:#fff;width:100%;}
.btn-secondary{background:var(--sage-soft);color:var(--sage);}
.btn-ghost{background:transparent;color:var(--ink-soft);border:1px solid var(--line);}
.btn-danger{background:var(--terracota-soft);color:var(--danger);}
.error-msg{background:#FBEAE3;color:var(--danger);padding:10px 14px;border-radius:10px;font-size:14px;margin-bottom:16px;}
.success-msg{background:#E9F2E9;color:var(--sage);padding:10px 14px;border-radius:10px;font-size:14px;margin-bottom:16px;}
.link-btn{background:none;border:none;color:var(--terracota);font-weight:600;text-decoration:underline;padding:0;}

/* App shell */
#app-view{display:none;min-height:100vh;}
#app-view.active{display:flex;}
.sidebar{width:250px;background:var(--paper);border-right:1px solid var(--line);padding:28px 18px;display:flex;flex-direction:column;flex-shrink:0;}
.brand{font-size:22px;font-weight:700;color:var(--ink);margin:0 8px 4px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:12px;color:var(--ink-soft);font-weight:600;font-size:14px;margin-bottom:4px;background:none;border:none;width:100%;text-align:left;}
.nav-item:hover{background:var(--cream);}
.nav-item.active{background:var(--terracota-soft);color:var(--terracota);}
.nav-subitem{padding-left:32px;font-size:13px;font-weight:500;}
.sidebar-footer{margin-top:auto;padding:14px;}
.bell-wrap{position:relative;}
.bell-btn{position:relative;background:none;border:none;cursor:pointer;font-size:18px;color:var(--ink-soft);padding:4px 6px;opacity:.75;}
.bell-btn:hover{opacity:1;}
.bell-dot{position:absolute;top:2px;right:4px;width:7px;height:7px;border-radius:50%;background:var(--danger);}
.alerts-panel{display:none;position:absolute;top:36px;right:0;width:300px;background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:6px;box-shadow:0 8px 24px rgba(0,0,0,.14);z-index:50;max-height:320px;overflow-y:auto;}
.alerts-panel.open{display:block;}
.alert-item{font-size:12px;color:var(--ink);padding:9px 8px;border-bottom:1px solid var(--line);line-height:1.4;}
.alert-item:last-child{border-bottom:none;}
.user-chip{font-size:13px;color:var(--ink-soft);margin-bottom:10px;padding:0 4px;}
.main{flex:1;padding:36px 44px;overflow-y:auto;max-height:100vh;display:flex;flex-direction:column;background:var(--tint, var(--cream));transition:background .4s ease;}
.main-topbar{display:none;justify-content:flex-end;align-items:center;min-height:32px;margin-bottom:8px;}
.mobile-topbar{display:none;align-items:center;gap:12px;padding:14px 16px;background:var(--paper);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:60;}
.mobile-topbar .brand{margin:0;font-size:18px;}
.hamburger-btn{background:none;border:none;padding:6px;display:flex;flex-direction:column;gap:4px;cursor:pointer;}
.hamburger-btn span{display:block;width:22px;height:2px;background:var(--ink);border-radius:2px;}
.sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:90;}
.sidebar-backdrop.open{display:block;}
@media(max-width:900px){
  #app-view.active{flex-direction:column;}
  .mobile-topbar{display:flex;}
  .sidebar{position:fixed;top:0;left:0;bottom:0;width:82vw;max-width:300px;z-index:100;transform:translateX(-100%);transition:transform .28s ease;box-shadow:0 0 0 rgba(0,0,0,0);}
  .sidebar.open{transform:translateX(0);box-shadow:8px 0 24px rgba(0,0,0,.18);}
  .main{padding:20px 16px 40px;max-height:none;}
  .page-header h2{font-size:22px;}
  .card{padding:18px;}
}
@media(max-width:480px){
  .main{padding:16px 12px 36px;}
  .card{padding:16px 14px;}
  .login-hero{padding:28px 20px;}
}
#main-content.fade-anim{animation:module-in .45s ease;}
@keyframes module-in{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.page-header{margin-bottom:28px;}
.page-header h2{font-size:28px;margin:0 0 6px;}
.page-header p{color:var(--ink-soft);margin:0;}

.card{background:var(--paper);border:1px solid var(--tint-line, var(--line));border-radius:var(--radius);padding:26px;margin-bottom:20px;}
.card-title{font-size:18px;font-weight:700;margin:0 0 16px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
@media(max-width:800px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr;}}
.card:has(table){overflow-x:auto;}

.chip{display:inline-flex;align-items:center;padding:8px 14px;border-radius:999px;border:1px solid var(--line);background:var(--cream);font-size:13px;font-weight:600;margin:4px 6px 4px 0;cursor:pointer;color:var(--ink-soft);}
.chip.selected{background:var(--accent, var(--terracota));border-color:var(--accent, var(--terracota));color:#fff;}

.city-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--paper);border:1px solid var(--line);border-radius:10px;max-height:200px;overflow-y:auto;z-index:20;box-shadow:0 8px 24px rgba(43,36,32,.12);margin-top:4px;}
.city-dropdown-item{padding:10px 14px;font-size:14px;cursor:pointer;}
.city-dropdown-item:hover{background:var(--cream);}
.bf-drop{border:2px dashed var(--line);border-radius:14px;padding:22px;text-align:center;cursor:pointer;color:var(--ink-soft);font-weight:600;background:var(--cream);}
.bf-drop:hover{border-color:var(--terracota);color:var(--terracota);}

.wizard-steps{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:24px;}
.wizard-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;background:var(--cream);color:var(--ink-soft);border:1px solid var(--line);}
.wizard-dot.done{background:var(--sage);color:#fff;border-color:var(--sage);}
.wizard-dot.current{background:var(--accent, var(--terracota));color:#fff;border-color:var(--accent, var(--terracota));}

.list-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--line);}
@media(max-width:600px){.list-row{flex-wrap:wrap;gap:10px;}}
.list-row:last-child{border-bottom:none;}
.badge{padding:4px 10px;border-radius:999px;font-size:12px;font-weight:700;background:var(--sage-soft);color:var(--sage);}
.badge.warn{background:var(--terracota-soft);color:var(--terracota);}
table{width:100%;border-collapse:collapse;}
th{text-align:left;font-size:12px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;padding:10px 8px;border-bottom:1px solid var(--line);}
td{padding:12px 8px;border-bottom:1px solid var(--line);font-size:14px;}
.small-btn{padding:6px 12px;font-size:13px;border-radius:999px;border:1px solid var(--line);background:var(--cream);}
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;}
.kpi-row.kpi-row-3{grid-template-columns:repeat(3,1fr);}
@media(max-width:900px){.kpi-row{grid-template-columns:repeat(2,1fr);}}
.kpi-tile{background:var(--paper);border:1px solid var(--tint-line, var(--line));border-radius:14px;padding:18px;text-align:center;}
.kpi-tile .val{font-family:'Fraunces',serif;font-size:26px;font-weight:600;color:var(--ink);}
.kpi-tile .lbl{font-size:12px;color:var(--ink-soft);margin-top:4px;}
.day-tile,.category-tile{background:#FFFFFF;border:1px solid #E7DFC9;border-radius:16px;padding:20px 14px;text-align:center;cursor:pointer;transition:border-color .2s ease, box-shadow .2s ease, background .2s ease;font-family:inherit;}
.day-tile:hover,.category-tile:hover:not(:disabled){border-color:#B8935A;box-shadow:0 6px 16px rgba(184,147,90,.15);}
.category-tile:disabled{opacity:.45;cursor:not-allowed;}
.day-tile .num{font-family:'Fraunces',serif;font-size:22px;font-weight:600;color:var(--ink);}
.day-tile .count,.category-tile .count{font-size:10px;color:#8A8377;margin-top:4px;}
.category-tile .label{font-family:'Fraunces',serif;font-size:15px;font-weight:600;color:var(--ink);margin-top:8px;}
.category-tile .category-icon{color:#8A8377;transition:color .2s ease;}
.category-tile.selected{border:2px solid #5B7A4E;background:#F4F8EF;}
.category-tile.selected .category-icon{color:#5B7A4E;}
.day-tile.active-day{border:2px solid var(--accent, var(--terracota));}
.day-tile.completed-day{background:var(--tint, var(--sage-soft));border-color:var(--accent, var(--terracota));}
.day-tile.locked-day{opacity:.5;}
.locked-preview{position:relative;}
.locked-preview-content{filter:blur(3px);opacity:.5;pointer-events:none;user-select:none;}
.unlock-card{background:#FFFFFF;border:1px solid var(--tint-line, var(--line));border-radius:16px;padding:26px 24px;text-align:center;margin-top:-14px;position:relative;z-index:1;}
.unlock-card .unlock-icon{font-size:26px;margin-bottom:10px;}
.unlock-card h3{font-family:'Fraunces',serif;font-size:17px;margin:0 0 6px;color:var(--ink);}
.unlock-card p{font-size:13px;color:var(--ink-soft);margin:0 0 16px;}
.back-link{background:none;border:none;padding:0;margin-bottom:12px;display:inline-block;font-size:12px;font-weight:600;color:#5C574E;cursor:pointer;}
.back-link:hover{text-decoration:underline;}
.progress-card-row{display:flex;align-items:center;gap:16px;}
.mini-ring{position:relative;flex-shrink:0;}
.mini-ring svg{transform:rotate(-90deg);}
.status-pill-live{display:inline-flex;align-items:center;gap:6px;background:#EFF5E8;color:#3E4A34;font-size:11px;font-weight:600;padding:6px 12px;border-radius:999px;margin-top:16px;}
.status-pill-live::before{content:'';width:6px;height:6px;border-radius:50%;background:#5B7A4E;flex-shrink:0;}

/* ---- Nutrición: macros de solo lectura, vista de plan en tabla, suplementación ---- */
.macro-stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
@media(max-width:640px){.macro-stat-grid{grid-template-columns:repeat(2,1fr);}}
.macro-stat-card{background:#F7FAF3;border-radius:12px;padding:12px 6px;text-align:center;}
.macro-stat-card .msc-val{font-family:'Fraunces',serif;font-weight:700;font-size:20px;color:#2B2621;}
.macro-stat-card .msc-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:#6B7A5E;margin-top:2px;}
.menu-preview-block{padding:14px 14px;border-top:1px solid #E8EEDF;}
.menu-preview-block:first-child{border-top:none;padding-top:0;}
.menu-preview-name{display:flex;align-items:center;font-family:'Fraunces',serif;font-weight:600;font-size:16px;color:#2B2621;margin-bottom:8px;}
.menu-preview-name .menu-preview-icon{display:inline-flex;align-items:center;justify-content:center;margin-right:8px;color:#5B7A4E;flex-shrink:0;}
.menu-preview-options{display:grid;grid-template-columns:1fr 1fr;gap:24px;}
@media(max-width:640px){.menu-preview-options{grid-template-columns:1fr;}}
.menu-preview-label{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#5B7A4E;margin:0 0 4px;}
.menu-preview-options ul{list-style:none;margin:0;padding:0;font-size:13px;color:#2B2621;line-height:1.45;}
.menu-preview-options li{position:relative;padding-left:14px;}
.menu-preview-options li::before{content:'';position:absolute;left:0;top:6.5px;width:5px;height:5px;border-radius:50%;background:#5B7A4E;}
.menu-accordion{max-height:0;overflow:hidden;transition:max-height .45s ease;}
.menu-accordion.open{max-height:4000px;}
.menu-more-btn{display:inline-flex;align-items:center;gap:6px;height:48px;}
.menu-more-chevron{display:inline-flex;transition:transform .3s ease;}
.menu-more-btn.open .menu-more-chevron{transform:rotate(180deg);}
.supp-row-elegant{display:flex;align-items:center;gap:12px;padding:12px 0;border-top:1px solid #E8EEDF;}
.supp-row-elegant:first-child{border-top:none;}
.supp-icon-circle{width:38px;height:38px;border-radius:50%;background:#F1F5EC;color:#5B7A4E;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.supp-row-elegant .sre-name{font-family:'Fraunces',serif;font-weight:600;font-size:14px;color:#2B2621;}
.supp-row-elegant .sre-meta{font-size:11px;color:#6B7A5E;margin-top:2px;}
.supp-time-pill{margin-left:auto;background:#EFF5E8;color:#5B7A4E;font-size:10px;font-weight:600;padding:5px 10px;border-radius:999px;white-space:nowrap;flex-shrink:0;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin:8px auto 0;max-width:280px;}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;background:var(--cream);border:1px solid var(--line);}
.cal-day.done{background:var(--sage-soft);border-color:var(--sage);}
.cal-day.today{box-shadow:0 0 0 1.5px #B8935A;}
.cal-num{font-weight:700;font-size:10px;color:var(--ink);}
.cal-mark{font-size:10px;line-height:1;font-weight:700;margin-top:2px;color:var(--sage);}
.photo-thumb{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:12px;border:1px solid var(--line);cursor:zoom-in;}
.photo-preview-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:1000;cursor:zoom-out;padding:24px;}
.photo-preview-box{max-width:min(600px,90vw);max-height:90vh;text-align:center;}
.photo-preview-box img{max-width:100%;max-height:80vh;border-radius:12px;object-fit:contain;}
.photo-preview-box p{color:#fff;font-size:14px;margin-top:10px;}
.empty-state{text-align:center;padding:40px 20px;color:var(--ink-soft);}

/* ---- Anillo de ritmo (marca) ---- */
.ring-master{transform:rotate(-90deg);}
.ring-arc{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:76 176;opacity:.25;transition:opacity .4s ease;}
.ring-arc-morning{stroke:var(--ring-morning);stroke-dashoffset:0;}
.ring-arc-afternoon{stroke:var(--ring-afternoon);stroke-dashoffset:-83.8;}
.ring-arc-evening{stroke:var(--ring-evening);stroke-dashoffset:-167.6;}
.ring-arc.active{opacity:1;}
.ring-arc.balanced{opacity:.5;}
.sidebar-ring-wrap{text-align:center;margin:4px 0 22px;}
.sidebar-ring-label{font-size:10.5px;color:var(--ink-soft);text-align:center;margin-top:8px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;}
.nav-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block;}

/* ---- Encabezado de identidad + mantra (reutilizable en todos los módulos) ---- */
.identity-header{margin-bottom:22px;}
.identity-header h2{font-family:'Fraunces',serif;font-size:30px;font-weight:700;margin:0 0 6px;color:var(--ink);line-height:1.15;}
.identity-header .subtitle{font-size:11px;color:var(--ink-soft);margin:0;text-transform:uppercase;letter-spacing:.08em;font-weight:600;}
.mantra-card{font-family:'Fraunces',serif;font-style:italic;font-size:20px;font-weight:500;line-height:1.4;color:var(--ink);border-bottom:1px solid var(--tint-line, var(--line));padding-bottom:18px;margin-bottom:22px;}
.mantra-card .mantra-lead{display:block;font-family:'Inter',sans-serif;font-style:normal;font-size:12px;font-weight:600;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}

/* ---- Pillrow ---- */
.pillrow{display:flex;flex-wrap:wrap;gap:8px;}
.pill{display:inline-flex;align-items:center;padding:7px 14px;border-radius:999px;border:1px solid var(--tint-line, var(--line));background:var(--paper);font-size:13px;font-weight:600;color:var(--ink-soft);}

/* ---- Timeline (Mi Evolución) ---- */
.timeline{position:relative;padding-left:22px;}
.timeline::before{content:'';position:absolute;left:5px;top:4px;bottom:4px;width:2px;background:var(--tint-line, var(--line));}
.timeline-item{position:relative;padding-bottom:18px;}
.timeline-item::before{content:'';position:absolute;left:-22px;top:2px;width:10px;height:10px;border-radius:50%;background:var(--accent, var(--terracota));}
.timeline-item:last-child{padding-bottom:0;}
.timeline-item .t-label{font-weight:700;font-size:13px;}
.timeline-item .t-meta{font-size:12px;color:var(--ink-soft);}

/* ---- Community feed ---- */
.feed-item{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--tint-line, var(--line));}
.feed-item:last-child{border-bottom:none;}
.feed-avatar{width:38px;height:38px;border-radius:50%;background:var(--tint, var(--cream));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:var(--accent, var(--terracota));flex-shrink:0;}
.live-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--accent, var(--sage));margin-right:6px;animation:live-pulse 1.6s ease-in-out infinite;}
@keyframes live-pulse{0%,100%{opacity:1;}50%{opacity:.35;}}

/* ---- Breath hero (Cortisol) ---- */
.breath-hero{text-align:center;padding:32px 16px;}
.breath-hero h3{font-family:'Fraunces',serif;font-size:19px;margin:0 0 8px;}
.breath-hero p{color:var(--ink-soft);font-size:14px;max-width:360px;margin:0 auto;}
.cortisol-emotion{background:#FBFDF9;border:1px solid #D9E4CE;border-radius:12px;padding:8px 6px;text-align:center;cursor:pointer;transition:background .15s ease, border-color .15s ease, color .15s ease;font-family:inherit;}
.cortisol-emotion .ce-emoji{display:block;font-size:17px;line-height:1;margin-bottom:3px;}
.cortisol-emotion .ce-label{display:block;font-size:10px;font-weight:700;color:var(--ink-soft);line-height:1.2;}
.cortisol-emotion.selected{background:#5B7A4E;border-color:#5B7A4E;}
.cortisol-emotion.selected .ce-label{color:#fff;}
.source-pill{display:inline-flex;align-items:center;gap:6px;background:#EFF5E8;color:#5B7A4E;font-size:11px;font-weight:700;padding:6px 11px;border-radius:999px;margin-bottom:14px;}
.source-pill::before{content:'';width:6px;height:6px;border-radius:50%;background:#5B7A4E;flex-shrink:0;}
/* ---- Hero por módulo (una pieza protagonista, composición distinta por módulo) ---- */
.hero{border-radius:20px;padding:28px;color:#fff;margin-bottom:24px;position:relative;overflow:hidden;}
.hero-eyebrow{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin:0 0 10px;position:relative;z-index:1;}
.hero-title{font-family:'Fraunces',serif;font-size:21px;font-weight:600;margin:0 0 6px;position:relative;z-index:1;}
.hero-meta{font-size:13px;opacity:.75;margin:0;position:relative;z-index:1;}
.hero-glow{position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle, rgba(255,255,255,.16) 0%, transparent 70%);}
.hero-row{display:flex;justify-content:space-between;align-items:center;margin-top:20px;position:relative;z-index:1;gap:16px;}
.hero-progress-track{flex:1;height:6px;background:rgba(255,255,255,.2);border-radius:999px;overflow:hidden;max-width:180px;}
.hero-progress-fill{height:100%;background:#D9BE8C;border-radius:999px;}
.hero-btn{background:#D9BE8C;color:#2B2621;border:none;padding:11px 20px;border-radius:999px;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;}
.hero-btn:disabled{opacity:.5;cursor:not-allowed;}
.section-label{font-family:'Fraunces',serif;font-size:15px;font-weight:600;margin:0 0 12px;color:var(--ink);}

.hero-split{display:flex;justify-content:space-between;align-items:center;gap:20px;}
.hero-rings{display:flex;gap:14px;position:relative;z-index:1;}
.macro-ring{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column;background:rgba(255,255,255,.12);border:3px solid rgba(255,255,255,.55);}
.macro-ring .mval{font-size:13px;font-weight:700;line-height:1;}
.macro-ring .mlbl{font-size:8px;text-transform:uppercase;letter-spacing:.03em;opacity:.8;margin-top:2px;}

.hero-figure{font-family:'Fraunces',serif;font-size:46px;font-weight:700;margin:4px 0 6px;position:relative;z-index:1;}

.hero-avatars{display:flex;position:relative;z-index:1;}
.hero-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;background:rgba(255,255,255,.18);border:2px solid rgba(0,0,0,.25);margin-left:-14px;}
.hero-avatar:first-child{margin-left:0;}

.detail-card{background:#FFFFFF;border:1px solid #E7DFC9;border-radius:16px;overflow:hidden;margin-bottom:16px;}
.detail-card-header{padding:20px 22px 16px;display:flex;gap:14px;}
.detail-card-icon{width:44px;height:44px;border-radius:12px;background:#F5E4D8;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.detail-card-title{font-family:'Fraunces',serif;font-weight:600;font-size:17px;margin:0;}
.detail-card-desc{font-size:12px;color:#8A8377;margin:2px 0 0;}
.detail-card-info{padding:0 22px 16px;display:flex;gap:20px;flex-wrap:wrap;}
.detail-card-info-label{font-size:9px;text-transform:uppercase;font-weight:700;color:#B8935A;margin:0 0 3px;letter-spacing:.03em;}
.detail-card-info-value{font-size:12.5px;font-weight:700;color:#2B2621;margin:0;}
.attendance-strip{padding:14px 22px;background:#FBF7EC;border-top:1px solid #E7DFC9;display:flex;align-items:center;gap:10px;}
.attendance-avatars{display:flex;flex-shrink:0;}
.attendance-avatar{width:26px;height:26px;border-radius:50%;margin-left:-9px;border:2px solid #FBF7EC;}
.attendance-avatars .attendance-avatar:first-child{margin-left:0;}
.attendance-count{font-size:11.5px;color:#5C574E;flex:1;}
.attendance-spots{font-size:10px;font-weight:700;color:#B8935A;background:#F3E3C2;padding:4px 9px;border-radius:100px;white-space:nowrap;}
.detail-card-action{padding:18px 22px 22px;}
.detail-card-action .btn{width:100%;background:#2B2621;color:#F3EFE6;font-size:13px;font-weight:700;padding:13px;border-radius:100px;}

.hero-ring-big{width:70px;height:70px;position:relative;flex-shrink:0;}
.hero-ring-big svg{transform:rotate(-90deg);}
.hero-ring-big .ring-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;}

/* ---- Login: hero dividido con aura de color, tema según hora del día ---- */
.theme-login-light{
  --lh-bg:#F5EFDF; --lh-word:#2B2621; --lh-slogan:#6B6459;
  --lf-bg:#211B17; --lf-title:#F3EFE6; --lf-label:#B0A599; --lf-input-border:#3A2F27;
  --lf-input-bg:#2B231E; --lf-input-text:#F3EFE6; --lf-btn-bg:#D9BE8C; --lf-btn-text:#241A08;
  --lf-foot:#B0A599; --lf-link:#D9BE8C;
}
.theme-login-dark{
  --lh-bg:#211B17; --lh-word:#F3EFE6; --lh-slogan:#C9C2B4;
  --lf-bg:#FFFDF8; --lf-title:#2B2621; --lf-label:#8A8377; --lf-input-border:#E7DFC9;
  --lf-input-bg:#FBF7EC; --lf-input-text:#2B2621; --lf-btn-bg:#2B2621; --lf-btn-text:#F3EFE6;
  --lf-foot:#8A8377; --lf-link:#B8935A;
}
#login-view{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--cream);padding:32px;}
.login-shell{display:flex;width:100%;max-width:840px;min-height:500px;border-radius:24px;overflow:hidden;box-shadow:0 30px 80px rgba(43,36,32,.18);}
.login-hero{flex:1;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;background:var(--lh-bg);transition:background .6s ease;padding:40px;text-align:center;}
.login-aura{position:absolute;width:280px;height:280px;border-radius:50%;filter:blur(50px);opacity:.4;pointer-events:none;}
.login-aura-gold{background:#D9A441;top:-70px;left:-70px;}
.login-aura-sage{background:#7C8B6F;bottom:-90px;left:28%;}
.login-aura-violet{background:#8A5FA0;top:15%;right:-90px;}
.login-hero .ring-master{position:relative;z-index:1;}
.login-word{position:relative;z-index:1;font-family:'Fraunces',serif;font-size:32px;font-weight:700;color:var(--lh-word);margin:18px 0 6px;transition:color .6s ease;}
.login-slogan{position:relative;z-index:1;font-family:'Fraunces',serif;font-style:italic;font-size:15px;color:var(--lh-slogan);margin:0;transition:color .6s ease;}
.login-form-panel{width:360px;max-width:100%;flex-shrink:0;background:var(--lf-bg);display:flex;align-items:center;justify-content:center;padding:40px;transition:background .6s ease;}
.login-card{width:100%;max-width:280px;}
.login-form-title{font-family:'Fraunces',serif;font-size:24px;font-weight:600;color:var(--lf-title);margin:0 0 26px;transition:color .6s ease;}
.login-form-panel .field label{color:var(--lf-label);transition:color .6s ease;}
.login-form-panel .field input{border-color:var(--lf-input-border);background:var(--lf-input-bg);color:var(--lf-input-text);transition:background .6s ease,color .6s ease,border-color .6s ease;}
.login-form-panel .field input:focus{outline-color:var(--lf-link);}
.login-form-panel .btn-primary{background:var(--lf-btn-bg);color:var(--lf-btn-text);transition:background .6s ease,color .6s ease;}
.login-form-panel .foot-note{color:var(--lf-foot);transition:color .6s ease;}
.login-form-panel .link-btn{color:var(--lf-link);font-weight:700;transition:color .6s ease;}
@media(max-width:760px){#login-view{padding:0;}.login-shell{flex-direction:column;border-radius:0;min-height:100vh;max-width:100%;}.login-hero{padding:32px 24px;}.login-form-panel{width:100%;}}
.login-divider{display:flex;align-items:center;gap:10px;margin:18px 0;}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:var(--lf-input-border);transition:background .6s ease;}
.login-divider span{font-size:11px;color:var(--lf-foot);text-transform:uppercase;letter-spacing:.04em;transition:color .6s ease;}
#google-signin-btn{display:flex;justify-content:center;}
</style>
</head>
<body>

<div id="login-view">
 <div class="login-shell">
  <div class="login-hero">
    <div class="login-aura login-aura-gold"></div>
    <div class="login-aura login-aura-sage"></div>
    <div class="login-aura login-aura-violet"></div>
    <svg class="ring-master" viewBox="0 0 100 100" width="56" height="56" aria-hidden="true">
      <circle class="ring-arc ring-arc-morning balanced" cx="50" cy="50" r="40"></circle>
      <circle class="ring-arc ring-arc-afternoon balanced" cx="50" cy="50" r="40"></circle>
      <circle class="ring-arc ring-arc-evening balanced" cx="50" cy="50" r="40"></circle>
    </svg>
    <h1 class="login-word">La Tribu</h1>
    <p class="login-slogan">Comunidad de bienestar y alto rendimiento.</p>
  </div>
  <div class="login-form-panel">
    <div class="login-card">
      <h2 class="login-form-title">Qué bueno verte de nuevo</h2>
      <div id="login-error"></div>
      <div id="login-form">
        <div class="field"><label>Email</label><input type="email" id="login-email" placeholder="tucorreo@ejemplo.com" onkeydown="if(event.key==='Enter'){event.preventDefault();handleLogin();}"></div>
        <div class="field"><label>Contraseña</label><input type="password" id="login-password" placeholder="••••••••" onkeydown="if(event.key==='Enter'){event.preventDefault();handleLogin();}"></div>
        <button class="btn btn-primary" onclick="handleLogin()">Ingresar</button>
        <div class="login-divider"><span>o</span></div>
        <div id="google-signin-btn"></div>
        <p class="foot-note" style="text-align:center;margin-top:18px;font-size:14px;">
          ¿Aún no tienes cuenta? <button class="link-btn" onclick="showRegister()">Regístrate</button>
        </p>
      </div>
      <div id="register-form" class="hidden">
        <div class="field"><label>Nombre completo</label><input type="text" id="reg-name"></div>
        <div class="field"><label>Email</label><input type="email" id="reg-email"></div>
        <div class="field"><label>Contraseña</label><input type="password" id="reg-password"></div>
        <button class="btn btn-primary" onclick="handleRegister()">Crear cuenta</button>
        <p class="foot-note" style="text-align:center;margin-top:18px;font-size:14px;">
          <button class="link-btn" onclick="showLogin()">Volver a iniciar sesión</button>
        </p>
      </div>
    </div>
  </div>
 </div>
</div>

<div id="app-view">
  <div class="mobile-topbar">
    <button class="hamburger-btn" onclick="toggleMobileNav()" aria-label="Abrir menú"><span></span><span></span><span></span></button>
    <h2 class="brand">La Tribu</h2>
  </div>
  <div class="sidebar-backdrop" id="sidebar-backdrop" onclick="closeMobileNav()"></div>
  <div class="sidebar" id="sidebar">
    <h2 class="brand">La Tribu</h2>
    <div class="sidebar-ring-wrap" id="sidebar-ring">
      <svg class="ring-master" viewBox="0 0 100 100" width="56" height="56" aria-hidden="true">
        <circle class="ring-arc ring-arc-morning" cx="50" cy="50" r="40"></circle>
        <circle class="ring-arc ring-arc-afternoon" cx="50" cy="50" r="40"></circle>
        <circle class="ring-arc ring-arc-evening" cx="50" cy="50" r="40"></circle>
      </svg>
      <div class="sidebar-ring-label" id="sidebar-ring-label">La Tribu</div>
    </div>
    <div id="nav-items"></div>
    <div class="sidebar-footer">
      <div class="user-chip" id="user-chip"></div>
      <button class="btn btn-ghost" style="width:100%" onclick="logout()">Cerrar sesión</button>
    </div>
  </div>
  <div class="main">
    <div class="main-topbar" id="main-topbar"></div>
    <div id="main-content"></div>
  </div>
</div>

<script>
const API = '';
let state = { token: localStorage.getItem('lt_token') || null, role: null, user: null, permissions: {}, clientType: null, onboardingComplete: false, notifications: [], view: 'personal-info', clients: [], currentClientId: null, moduleClientIds: {}, adminHubOpen: false, wizardStep: 1 };

// Caché en memoria de respuestas GET (TTL corto) para que volver a un
// módulo visto hace poco cargue al instante en vez de esperar otro viaje
// de red — cualquier mutación (POST/PUT/PATCH/DELETE) limpia toda la
// caché para no arriesgar mostrar datos desactualizados tras editar algo.
const _apiCache = new Map();
const API_CACHE_TTL_MS = 20000;
async function api(path, opts = {}) {
  const method = (opts.method || 'GET').toUpperCase();
  const isGet = method === 'GET';
  if (isGet) {
    const cached = _apiCache.get(path);
    if (cached && Date.now() - cached.time < API_CACHE_TTL_MS) return cached.data;
  }
  const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
  if (state.token && !(opts.body instanceof FormData)) headers['Authorization'] = `Bearer ${state.token}`;
  else if (state.token) headers['Authorization'] = `Bearer ${state.token}`;
  const finalOpts = { ...opts, headers };
  if (opts.body instanceof FormData) delete finalOpts.headers['Content-Type'];
  const res = await fetch(API + path, finalOpts);
  const data = await res.json().catch(() => ({}));
  if (res.status === 402 && state.role === 'cliente') {
    state.planExpired = true;
    renderPlanExpiredScreen();
  }
  if (!res.ok || data.success === false) throw new Error(data.error || 'Error de red.');
  if (isGet) _apiCache.set(path, { data, time: Date.now() });
  else _apiCache.clear();
  return data;
}

function showRegister(){ document.getElementById('login-form').classList.add('hidden'); document.getElementById('register-form').classList.remove('hidden'); }
function showLogin(){ document.getElementById('register-form').classList.add('hidden'); document.getElementById('login-form').classList.remove('hidden'); }

async function handleLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errBox = document.getElementById('login-error');
  errBox.innerHTML = '';
  try {
    const data = await api('/api/auth/login', { method: 'POST', body: JSON.stringify({ email, password }) });
    onAuthSuccess(data);
  } catch (e) {
    errBox.innerHTML = `<div class="error-msg">${e.message}</div>`;
  }
}

async function handleRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const errBox = document.getElementById('login-error');
  errBox.innerHTML = '';
  try {
    const data = await api('/api/auth/register', { method: 'POST', body: JSON.stringify({ name, email, password }) });
    errBox.innerHTML = `<div class="success-msg">${data.message || 'Cuenta creada, pendiente de activación.'}</div>`;
    showLogin();
  } catch (e) {
    errBox.innerHTML = `<div class="error-msg">${e.message}</div>`;
  }
}

async function initGoogleSignIn(retriesLeft = 20) {
  const container = document.getElementById('google-signin-btn');
  if (!container) return;
  if (typeof google === 'undefined' || !google.accounts) {
    if (retriesLeft > 0) setTimeout(() => initGoogleSignIn(retriesLeft - 1), 250);
    return;
  }
  try {
    const { googleClientId } = await api('/api/config');
    if (!googleClientId) return;
    google.accounts.id.initialize({ client_id: googleClientId, callback: handleGoogleCredentialResponse });
    google.accounts.id.renderButton(container, { theme: 'filled_black', size: 'large', shape: 'pill', width: 280, text: 'continue_with' });
  } catch (e) { /* login con Google no disponible, se omite el botón */ }
}
async function handleGoogleCredentialResponse(response) {
  const errBox = document.getElementById('login-error');
  errBox.innerHTML = '';
  try {
    const data = await api('/api/auth/google', { method: 'POST', body: JSON.stringify({ credential: response.credential }) });
    if (data.pending) {
      errBox.innerHTML = `<div class="success-msg">${data.message}</div>`;
      return;
    }
    onAuthSuccess(data);
  } catch (e) {
    errBox.innerHTML = `<div class="error-msg">${e.message}</div>`;
  }
}
function onAuthSuccess(data) {
  state.token = data.token;
  state.role = data.role;
  state.user = data.user;
  state.permissions = data.permissions || {};
  state.clientType = data.clientType || null;
  state.onboardingComplete = !!data.onboardingComplete;
  state.planExpired = !!data.planExpired;
  state.planEndDate = data.planEndDate || null;
  localStorage.setItem('lt_token', data.token);
  if (data.role === 'admin') state.view = 'admin-home';
  else state.view = (CLIENT_NAV.find(item => item.visible(state)) || CLIENT_NAV[0]).key;
  boot();
}

function logout() {
  localStorage.removeItem('lt_token');
  _apiCache.clear();
  state = { token: null, role: null, user: null, permissions: {}, clientType: null, onboardingComplete: false, planExpired: false, planEndDate: null, notifications: [], view: 'personal-info', clients: [], currentClientId: null, moduleClientIds: {}, adminHubOpen: false, wizardStep: 1 };
  document.getElementById('app-view').classList.remove('active');
  document.getElementById('login-view').style.display = 'flex';
  applyLoginTheme();
}

// Tema del login por hora real del dispositivo (no prefers-color-scheme): antes
// de las 18:00 tema "light", desde las 18:00 tema "dark" — los paneles hero/
// formulario intercambian toda su paleta entre uno y otro (ver CSS .theme-login-*).
function getLoginTheme() {
  return new Date().getHours() < 18 ? 'light' : 'dark';
}
function applyLoginTheme() {
  const view = document.getElementById('login-view');
  if (!view) return;
  const theme = getLoginTheme();
  view.classList.remove('theme-login-light', 'theme-login-dark');
  view.classList.add(theme === 'light' ? 'theme-login-light' : 'theme-login-dark');
}
applyLoginTheme();
setInterval(applyLoginTheme, 5 * 60 * 1000);

async function boot() {
  if (!state.token) return;
  try {
    const data = await api('/api/auth/me');
    state.role = data.role; state.user = data.user; state.permissions = data.permissions || {}; state.clientType = data.clientType || null; state.onboardingComplete = !!data.onboardingComplete;
    state.planExpired = !!data.planExpired; state.planEndDate = data.planEndDate || null;
    document.getElementById('login-view').style.display = 'none';
    document.getElementById('app-view').classList.add('active');
    if (state.role === 'cliente' && state.planExpired) {
      renderPlanExpiredScreen();
      return;
    }
    if (!state.view || (state.view === 'personal-info' && state.role === 'admin')) state.view = 'admin-home';
    if (state.role === 'cliente' && !CLIENT_NAV.some(item => item.key === state.view && item.visible(state))) {
      state.view = (CLIENT_NAV.find(item => item.visible(state)) || CLIENT_NAV[0]).key;
    }
    if (state.role === 'admin') {
      try { const { notifications } = await api('/api/admin/notifications'); state.notifications = notifications; } catch (e) { state.notifications = []; }
    }
    renderNav();
    renderMain();
    if (state.role === 'cliente') loadClientAlerts();
  } catch (e) {
    logout();
  }
}

// ---------------- Navigation ----------------

// El orden sigue el recorrido del anillo de ritmo: mañana (entrenamiento) → tarde
// (nutrición/suplementación/cortisol) → noche (descanso/comunidad) → balance (info/evolución).
// Matriz de acceso por tipo de cliente: Información Personal (onboarding)
// requiere ser cliente de coaching (1:1 u online) — lead_wellness no accede.
// Cortisol, Descanso y Eventos son autoservicio y quedan abiertos a los 3
// tipos (por eso no dependen de onboardingComplete para lead_wellness, ya
// que un lead nunca puede completar un onboarding al que no tiene acceso).
// Entrenamiento y Nutrición requieren que un mentor arme algo — para
// lead_wellness el ítem de nav sigue visible (entra y ve una vista previa
// bloqueada, no lo escondemos), pero el módulo mismo decide qué mostrar.
// coaching_1_1 y coaching_online tienen acceso exactamente igual en todo —
// la única diferencia entre ambos es de tono/copy (mentor 1:1 en persona vs.

function toggleAdminHubMenu() {
  state.adminHubOpen = !state.adminHubOpen;
  renderNav();
}
function renderNav() {
  if (state.role === 'admin') {
    const unread = (state.notifications || []).filter(n => !n.read).length;
    const hubSubViews = new Set(ADMIN_HUB_SUBITEMS.map(s => s.key));
    const hubExpanded = state.adminHubOpen || hubSubViews.has(state.view);
    document.getElementById('nav-items').innerHTML = ADMIN_NAV.map(item => {
      if (item.key === 'admin-hub') {
        const button = `<button class="nav-item ${hubExpanded ? 'active' : ''}" onclick="toggleAdminHubMenu()">${item.label}</button>`;
        if (!hubExpanded) return button;
        const subItems = ADMIN_HUB_SUBITEMS.map(sub => `
          <button class="nav-item nav-subitem ${state.view === sub.key ? 'active' : ''}" onclick="setView('${sub.key}')">${sub.label}</button>
        `).join('');
        return button + subItems;
      }
      return `<button class="nav-item ${state.view === item.key ? 'active' : ''}" onclick="setView('${item.key}')">${item.label}${item.key === 'admin-notifications' && unread ? ` <span class="badge">${unread}</span>` : ''}</button>`;
    }).join('');
  } else {
    document.getElementById('nav-items').innerHTML = CLIENT_NAV.filter(item => item.visible(state)).map(item => {
      const cfg = MODULE_THEME[item.key];
      const dotColor = cfg ? `var(${ARC_COLOR_VAR[cfg.arc]})` : 'var(--ink-soft)';
      const locked = state.clientType === 'lead_wellness' && (item.key === 'training' || item.key === 'nutrition');
      return `<button class="nav-item ${state.view === item.key ? 'active' : ''}" onclick="setView('${item.key}')">
        <span class="nav-dot" style="background:${dotColor}"></span>${item.label}${locked ? ' <span style="font-size:12px;">🔒</span>' : ''}
      </button>`;
    }).join('');
  }
  document.getElementById('user-chip').innerText = `${state.user?.name || ''} · ${state.role === 'admin' ? 'Admin' : 'Miembro'}`;
  applyModuleTheme(state.view);
  renderTopbar();
}
function applyModuleTheme(viewKey) {
  const cfg = MODULE_THEME[viewKey];
  const main = document.querySelector('.main');
  if (main) {
    main.classList.remove('theme-neutral', 'theme-green');
    main.classList.add(cfg && cfg.theme === 'green' ? 'theme-green' : 'theme-neutral');
  }
  const ring = document.getElementById('sidebar-ring');
  if (ring) {
    ['morning', 'afternoon', 'evening'].forEach(arc => {
      const arcEl = ring.querySelector('.ring-arc-' + arc);
      if (!arcEl) return;
      arcEl.classList.remove('active', 'balanced');
      if (!cfg || cfg.arc === 'balanced') arcEl.classList.add('balanced');
      else if (cfg.arc === arc) arcEl.classList.add('active');
    });
  }
  const label = document.getElementById('sidebar-ring-label');
  if (label) label.textContent = cfg ? cfg.ringLabel : 'La Tribu';
}
function renderTopbar() {
  const bar = document.getElementById('main-topbar');
  if (!bar) return;
  const showBell = state.role === 'cliente';
  bar.style.display = showBell ? 'flex' : 'none';
  if (!showBell) { bar.innerHTML = ''; return; }
  const hasUnread = (state.clientAlerts || []).length || (state.clientNotifications || []).some(n => !n.read);
  bar.innerHTML = `
    <div class="bell-wrap">
      <button class="bell-btn" id="notif-bell" onclick="toggleClientAlertsPanel()" aria-label="Notificaciones">🔔<span class="bell-dot" id="bell-dot" style="display:${hasUnread ? 'block' : 'none'};"></span></button>
      <div class="alerts-panel" id="client-alerts-panel"></div>
    </div>
  `;
}
function toggleClientAlertsPanel() {
  const panel = document.getElementById('client-alerts-panel');
  if (!panel) return;
  const notifItems = (state.clientNotifications || []).map(n => `<div class="alert-item">${n.message}</div>`);
  const alertItems = (state.clientAlerts || []).map(a => `<div class="alert-item">${a}</div>`);
  const items = [...notifItems, ...alertItems];
  panel.innerHTML = items.length ? items.join('') : '<div class="alert-item" style="color:var(--ink-soft);">Sin novedades.</div>';
  const willOpen = !panel.classList.contains('open');
  panel.classList.toggle('open');
  const unread = (state.clientNotifications || []).filter(n => !n.read);
  if (willOpen && unread.length) {
    api(`/api/clients/${state.user.id}/notifications/read-all`, { method: 'PATCH' })
      .then(() => {
        state.clientNotifications.forEach(n => n.read = true);
        const dot = document.getElementById('bell-dot');
        if (dot && !(state.clientAlerts || []).length) dot.style.display = 'none';
      })
      .catch(() => {});
  }
}
document.addEventListener('click', (e) => {
  const panel = document.getElementById('client-alerts-panel');
  const bell = document.getElementById('notif-bell');
  if (panel && panel.classList.contains('open') && !panel.contains(e.target) && e.target !== bell) panel.classList.remove('open');
});
async function loadClientAlerts() {
  if (state.role !== 'cliente' || state.clientType === 'lead_wellness') { state.clientAlerts = []; return; }
  const clientId = state.user.id;
  const alerts = [];
  try {
    if (state.permissions?.training) {
      const [{ client }, { completions }] = await Promise.all([
        api(`/api/clients/${clientId}`),
        api(`/api/clients/${clientId}/training-completions`),
      ]);
      const trainingDays = client.training_days || 0;
      if (trainingDays) {
        const weekStart = getWeekStart();
        const doneThisWeek = new Set(completions.filter(c => c.completed_date >= weekStart).map(c => c.day_number)).size;
        const dow = new Date().getDay();
        const elapsedDaysThisWeek = dow === 0 ? 7 : dow;
        const expectedByNow = Math.min(trainingDays, Math.round((elapsedDaysThisWeek / 7) * trainingDays));
        if (doneThisWeek < expectedByNow) {
          alerts.push(`Vas atrasado con tu entrenamiento esta semana: ${doneThisWeek}/${trainingDays} días completados.`);
        }
      }
    }
  } catch (e) { /* silencioso: el campanario no debe romper el resto de la app */ }
  try {
    if (state.onboardingComplete) {
      const { checkins } = await api(`/api/clients/${clientId}/evolution`);
      const last = checkins[checkins.length - 1];
      if (last && last.adherence_pct != null && last.adherence_pct < 70) {
        alerts.push(`Tu adherencia al plan de alimentación bajó a ${last.adherence_pct}% en tu último check-in.`);
      }
    }
  } catch (e) { /* silencioso */ }
  try {
    const { notifications } = await api(`/api/clients/${clientId}/notifications`);
    state.clientNotifications = notifications;
  } catch (e) { state.clientNotifications = []; }
  state.clientAlerts = alerts;
  renderNav();
}

function setView(view, extra) {
  state.view = view;
  if (extra) Object.assign(state, extra);
  renderNav();
  renderMain();
  closeMobileNav();
}
function toggleMobileNav() {
  document.getElementById('sidebar')?.classList.toggle('open');
  document.getElementById('sidebar-backdrop')?.classList.toggle('open');
}
function closeMobileNav() {
  document.getElementById('sidebar')?.classList.remove('open');
  document.getElementById('sidebar-backdrop')?.classList.remove('open');
}

function renderMain() {
  const el = document.getElementById('main-content');
  applyModuleTheme(state.view);
  const routes = {
    'personal-info': renderPersonalInfo,
    'training': renderTraining,
    'nutrition': renderNutrition,
    'cortisol': renderCortisol,
    'rest': renderRest,
    'community': renderCommunity,
    'evolution': renderEvolution,
    'admin-home': renderAdminHome,
    'admin-clients': renderAdminClients,
    'admin-client-detail': renderAdminClientDetail,
    'admin-community': renderAdminCommunity,
    'admin-notifications': renderAdminNotifications,
    'admin-quotes': renderAdminQuotes,
  };
  (routes[state.view] || renderPersonalInfo)(el);
  el.classList.remove('fade-anim');
  void el.offsetWidth;
  el.classList.add('fade-anim');
}

// Cada módulo de administración (Entrenamiento, Nutrición, ...) mantiene su
// propio cliente seleccionado — independiente de los demás módulos — para
// que cambiar de cliente en uno no afecte a los otros. `admin-client-detail`
// (la ficha "Resumen") es la excepción: usa state.currentClientId porque se
// entra a ella siempre desde la lista de Clientes con un cliente ya elegido.
function currentClientId() {
  if (state.role !== 'admin') return state.user.id;
  if (state.view === 'admin-client-detail') return state.currentClientId;
  return (state.moduleClientIds || {})[state.view] || null;
}
async function ensureClientsLoaded() {
  if (state.clients && state.clients.length) return;
  try { const { clients } = await api('/api/clients'); state.clients = clients; } catch (e) { /* silencioso: el switcher solo se degrada a vacío */ }
}
// Devuelve solo el campo de búsqueda (sin card propia) para que cada módulo
// lo integre dentro de su primera card — no como una card aparte.
function renderAdminClientSwitcher(moduleKey) {
  const clients = state.clients || [];
  const currentId = (state.moduleClientIds || {})[moduleKey];
  const current = clients.find(c => c.id === currentId);
  return `
    <div class="field" style="margin-bottom:18px;">
      <label>Cliente</label>
      <div style="display:flex;gap:8px;">
        <input list="admin-module-client-list-${moduleKey}" id="admin-module-client-search-${moduleKey}" placeholder="Escribe un nombre..." value="${current ? current.name : ''}" style="flex:1;" onkeydown="if(event.key==='Enter'){event.preventDefault();submitAdminModuleClientSearch('${moduleKey}');}">
        <button type="button" class="btn btn-ghost" style="width:auto;" onclick="submitAdminModuleClientSearch('${moduleKey}')">Buscar</button>
      </div>
      <datalist id="admin-module-client-list-${moduleKey}">
        ${clients.map(c => `<option value="${c.name}"></option>`).join('')}
      </datalist>
    </div>
  `;
}
function submitAdminModuleClientSearch(moduleKey) {
  const input = document.getElementById(`admin-module-client-search-${moduleKey}`);
  if (input) handleAdminModuleClientPick(moduleKey, input.value);
}
function handleAdminModuleClientPick(moduleKey, name) {
  const clients = state.clients || [];
  const match = clients.find(c => c.name === name);
  if (!match) return;
  if (!state.moduleClientIds) state.moduleClientIds = {};
  if (state.moduleClientIds[moduleKey] !== match.id) {
    state.moduleClientIds[moduleKey] = match.id;
    renderMain();
  }
}
function goToClientModule(moduleKey) {
  if (!state.moduleClientIds) state.moduleClientIds = {};
  state.moduleClientIds[moduleKey] = state.currentClientId;
  setView(moduleKey);
}
async function renderAdminModulePicker(el, title, subtitle, moduleKey, cardTitle) {
  await ensureClientsLoaded();
  el.innerHTML = `
    ${renderIdentityHeader(title, subtitle, '')}
    <div class="card">
      <div class="card-title">${cardTitle}</div>
      ${renderAdminClientSwitcher(moduleKey)}
      <div class="empty-state">Selecciona un cliente para continuar.</div>
    </div>
  `;
}
// state.clientType solo es exacto para la propia sesión del cliente. Cuando
// el admin navega el módulo de un cliente, hay que leer el tipo desde el
// cliente seleccionado en ESE módulo (cache de state.clients), no del admin.
function currentClientType() {
  if (state.role !== 'admin') return state.clientType;
  const id = currentClientId();
  const c = (state.clients || []).find(c => c.id === id);
  return c ? c.client_type : null;
}

let _personalInfoLoadedFor = null;
let _pendingOnboardingFiles = {};

function renderPersonalInfo(el) {
  if (state.role === 'admin') { renderPersonalInfoAdminView(el); return; }
  const clientId = currentClientId();
  if (_personalInfoLoadedFor !== clientId) {
    onboardingData = {};
    _personalInfoLoadedFor = clientId;
    _pendingOnboardingFiles = {};
    window._m3Draft = null;
    window._m3DraftClientId = null;

  renderPersonalInfoBody(el);
}

    <div class="wizard-steps">
      ${ONBOARDING_MODULES.map(m => `<div class="wizard-dot ${m.n < step ? 'done' : ''} ${m.n === step ? 'current' : ''}" onclick="setStep(${m.n})">${m.n}</div>`).join('')}

        ${mod.fields.map(f => renderField(f)).join('')}

// Vista de solo lectura para el admin: en vez del wizard editable (que
// siempre arranca en blanco), muestra las respuestas reales que el cliente
// ya diligenció, módulo por módulo, usando la misma navegación de pasos.
function renderModuleAnswerRows(mod, personalInfo, report) {
  let rows;
  if (mod.n === 1) {
    rows = [
      ['Fecha de nacimiento', personalInfo.birthdate],
      ['Género', personalInfo.gender],
      ['Ocupación', personalInfo.occupation],
      ['Estado civil', personalInfo.marital_status],
      ['País', personalInfo.country],
      ['Ciudad', personalInfo.city],
      ['Celular', personalInfo.phone_number],
    ];
  } else {
    rows = mod.fields.map(f => {
      const raw = report[f.id];
      const value = f.type === 'chips' ? (Array.isArray(raw) && raw.length ? raw.join(', ') : null) : raw;
      return [f.label, value];
    });
  }
  return `<table><tbody>${rows.map(([label, value]) => `<tr><td style="padding:8px;font-weight:700;width:45%;">${label}</td><td style="padding:8px;">${value !== undefined && value !== null && value !== '' ? value : '—'}</td></tr>`).join('')}</tbody></table>`;
}

function fieldIcon(type) {
  const path = FIELD_ICONS[type] || FIELD_ICONS.text;
  return `<span class="field-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none">${path}</svg></span>`;
}

function renderField(f) {
  const val = onboardingData[f.id];
  if (f.type === 'select') {
    return `<div class="field"><label>${fieldIcon('select')}${f.label}</label><div class="select-field">
      <select id="field-${f.id}">
        <option value="">Selecciona…</option>
        ${f.options.map(o => `<option value="${o}" ${val === o ? 'selected' : ''}>${o}</option>`).join('')}
      </select>
      <span class="select-arrow">⌄</span>
    </div></div>`;
  }
  if (f.type === 'segmented') {
    const min = f.min ?? 1, max = f.max ?? 6;
    const current = val !== undefined && val !== '' ? Number(val) : min;
    const cells = [];
    for (let n = min; n <= max; n++) cells.push(n);
    return `<div class="field"><label>${fieldIcon('segmented')}${f.label}</label><div class="segmented-group" id="field-${f.id}-group">
      ${cells.map(n => `<button type="button" class="segmented-cell ${n === current ? 'selected' : ''}" onclick="setSegmented('${f.id}', ${n})">${n}</button>`).join('')}
    </div><input type="hidden" id="field-${f.id}" value="${current}"></div>`;
  }
  if (f.type === 'chevron') {
    const min = f.min ?? 0, step = f.step ?? 1;
    const current = val ?? min;
    return `<div class="field"><label>${fieldIcon('chevron')}${f.label}</label><div class="chevron-field">
      <span class="chevron-value" id="field-${f.id}-val">${current}</span>
      <input type="hidden" id="field-${f.id}" value="${current}">
      <div class="chevron-stack">
        <button type="button" class="chevron-btn" onclick="changeChevron('${f.id}', ${step}, ${min})">▲</button>
        <button type="button" class="chevron-btn" onclick="changeChevron('${f.id}', -${step}, ${min})">▼</button>
      </div>
    </div></div>`;
  }
  if (f.type === 'slider') {
    const min = f.min ?? 1, max = f.max ?? 10;
    const current = val ?? min;
    return `<div class="field"><div class="slider-field">
      <div class="slider-top"><span class="slider-label">${fieldIcon('slider')}${f.label}</span><span class="slider-value" id="field-${f.id}-val">${current}</span></div>
      <input type="range" id="field-${f.id}" min="${min}" max="${max}" value="${current}" oninput="document.getElementById('field-${f.id}-val').textContent=this.value">
      <div class="slider-scale"><span>${f.minLabel || ''}</span><span>${f.maxLabel || ''}</span></div>
    </div></div>`;
  }
  if (f.type === 'time') {
    return `<div class="field"><label>${f.label}</label><div class="time-field">
      <input type="time" id="field-${f.id}" value="${val ?? ''}">
      ${fieldIcon('time')}
    </div></div>`;
  }
  if (f.type === 'chips') {
    const selected = Array.isArray(val) ? val : [];
    return `<div class="field" id="field-${f.id}" style="grid-column:1 / -1;">
      <label>${fieldIcon('chips')}${f.label}</label>
      <div>${f.options.map(o => `<span class="chip ${selected.includes(o) ? 'selected' : ''}" onclick="toggleChip('${f.id}','${o.replace(/'/g,"\\'")}')">${o}</span>`).join('')}</div>
      ${selected.includes('Otro') ? `<input type="text" style="margin-top:8px" placeholder="Especifica…" id="field-${f.id}-otro" value="${onboardingData[f.id + '_otro'] || ''}">` : ''}
    </div>`;
  }
  return `<div class="field"><label>${fieldIcon(f.type)}${f.label}</label><input type="${f.type}" id="field-${f.id}" value="${val ?? ''}"></div>`;
}

function toggleChip(fieldId, option) {
  syncStepFieldsFromDOM(state.wizardStep);
  const cur = Array.isArray(onboardingData[fieldId]) ? onboardingData[fieldId].slice() : [];
  const idx = cur.indexOf(option);
  if (idx >= 0) cur.splice(idx, 1); else cur.push(option);
  onboardingData[fieldId] = cur;
  renderPersonalInfoBody(document.getElementById('main-content'));
}

function setSegmented(fieldId, value) {
  const input = document.getElementById(`field-${fieldId}`);
  if (!input) return;
  input.value = value;
  onboardingData[fieldId] = String(value);
  const group = document.getElementById(`field-${fieldId}-group`);
  if (group) group.querySelectorAll('.segmented-cell').forEach(cell => {
    cell.classList.toggle('selected', Number(cell.textContent) === value);
  });
  clearFieldError(input);
}
function changeChevron(fieldId, delta, min) {
  const input = document.getElementById(`field-${fieldId}`);
  const display = document.getElementById(`field-${fieldId}-val`);
  if (!input) return;
  const floor = min ?? 0;
  const current = Number(input.value) || 0;
  const next = Math.max(floor, Math.round((current + delta) * 10) / 10);
  input.value = next;
  if (display) display.textContent = next;
  onboardingData[fieldId] = String(next);
  clearFieldError(input);
}

function initFieldDependencies(step) {
  const update = () => {
    const rules = [
        { id: 'condition', value: 'Otra', target: 'condition_other' },
      { id: 'mental_health', value: 'Otro', target: 'mental_health_other' },
      { id: 'snacks', values: ['A veces', 'Siempre'], target: 'snacks_qty' },
      { id: 'alcohol', notValue: 'Nunca', target: 'alcohol_type' },
      { id: 'substances', value: 'Otra', target: 'substances_detail' },
      { id: 'substances', values: ['Tabaco', 'Alcohol frecuente', 'Cannabis', 'Esteroides'], target: 'substances_frequency' },
      { id: 'supps_active', value: 'Sí', target: 'supps_list' },
      { id: 'probiotics', value: 'Sí', target: 'probiotics_types' },
      { id: 'sports_active', value: 'Sí', target: 'sports_detail' },
      { id: 'intervention_surgery', value: 'Sí', target: 'intervention_surgery_detail' },
      { id: 'meds', value: 'Sí', target: 'meds_detail' },
      { id: 'medical_clearance', value: 'Sí', target: null }
    ];
    rules.forEach(rule => {
      const el = document.getElementById(`field-${rule.id}`);
      const target = rule.target ? document.getElementById(`field-${rule.target}`) : null;
      if (!el || !target) return;
      const val = el.value;
      const show = rule.values ? rule.values.includes(val) : rule.notValue ? val !== rule.notValue && val !== '' : val === rule.value;
      const fieldWrapper = target.closest('.field');
      if (fieldWrapper) fieldWrapper.classList.toggle('conditional-hidden', !show);
      if (!show && rule.target) {
        onboardingData[rule.target] = Array.isArray(onboardingData[rule.target]) ? [] : '';
        onboardingData[`${rule.target}_otro`] = '';
      }
    });
  };

  const watchIds = ['condition', 'mental_health', 'snacks', 'alcohol', 'substances', 'supps_active', 'probiotics', 'sports_active', 'intervention_surgery', 'meds'];
  watchIds.forEach(id => {
    const el = document.getElementById(`field-${id}`);
    if (!el) return;
    el.addEventListener('change', update);
    el.addEventListener('input', update);
  });
  update();
}

function openPhotoPreview(url, caption) {
  const overlay = document.createElement('div');
  overlay.className = 'photo-preview-overlay';
  overlay.onclick = () => overlay.remove();
  overlay.innerHTML = `<div class="photo-preview-box"><img src="${url}"><p>${caption || ''}</p></div>`;
  document.body.appendChild(overlay);
}

function toggleAccordion(button) {
  const item = button.closest('.accordion-item');
  const content = item.querySelector('.accordion-content');
  const active = content.classList.contains('active');
  document.querySelectorAll('.accordion-content').forEach(c => c.classList.remove('active'));
  if (!active) content.classList.add('active');
}

function syncStepFieldsFromDOM(step) {
  const mod = ONBOARDING_MODULES.find(m => m.n === step);
  if (!mod) return;
  mod.fields.forEach(f => {
    if (f.type === 'chips') {
      const otroInput = document.getElementById(`field-${f.id}-otro`);
      if (otroInput) onboardingData[f.id + '_otro'] = otroInput.value;
      return;
    }
    const input = document.getElementById(`field-${f.id}`);
    if (!input) return;
    if (f.type === 'file') {
      if (input.files && input.files[0]) {
        onboardingData[f.id] = input.files[0].name;
      }
      return;
    }
    onboardingData[f.id] = input.value;
  });
}

function clearFieldError(el) {
  const wrapper = el.closest('.field');
  if (wrapper) wrapper.classList.remove('invalid');
}

function validateStep(step) {
  const mod = ONBOARDING_MODULES.find(m => m.n === step);
  if (!mod) return true;
  let valid = true;
  for (const f of mod.fields) {
    if (f.type === 'file') continue;
    if (!f.required) continue;
    const el = document.getElementById(`field-${f.id}`);
    if (!el) continue;
    const wrapper = el.closest('.field');
    if (wrapper && wrapper.classList.contains('conditional-hidden')) {
      if (wrapper) wrapper.classList.remove('invalid');
      continue;
    }
    const isEmpty = f.type === 'chips'
      ? !(Array.isArray(onboardingData[f.id]) && onboardingData[f.id].length > 0)
      : String(el.value || '').trim() === '';
    if (isEmpty) {
      if (wrapper) wrapper.classList.add('invalid');
      valid = false;
    } else {
      if (wrapper) wrapper.classList.remove('invalid');
    }
  }
  return valid;
}

async function uploadPendingFiles(clientId) {
  const file = _pendingOnboardingFiles.checkup_file;
  if (!file) return;
  const formData = new FormData();
  formData.append('checkup_file', file);
  formData.append('onboarding_report', JSON.stringify(onboardingData));
  const result = await api(`/api/clients/${clientId}/personal-info-file`, { method: 'POST', body: formData });
  onboardingData.checkup_file_url = result.file_url;
  onboardingData.checkup_file_name = result.file_name;
  onboardingData.checkup_uploaded_at = result.uploaded_at;
  _pendingOnboardingFiles = {};
}

function setStep(n) {
  if (n < 1 || n > 9) return;
  state.wizardStep = n;
  renderMain();
}

async function saveOnboardingStep(step) {
  if (!validateStep(step)) return;
  syncStepFieldsFromDOM(step);
  cleanConditionalFields(step);
  capturePendingFiles(step);
  if (step < 9) {
    setStep(step + 1);
    return;
  }
  // Finalizar: único momento en que todo el wizard se guarda de forma definitiva.
  const clientId = currentClientId();
  try {
    await uploadPendingFiles(clientId);
    const bodyDraft = window._m3Draft || {};
    const payload = {
      birthdate: onboardingData.birthdate, gender: onboardingData.gender,
      occupation: onboardingData.occupation, marital_status: onboardingData.marital_status,
      country: onboardingData.country, city: onboardingData.city,
      phone_code: onboardingData.phone_code, phone_number: onboardingData.phone_number,
      weight: bodyDraft.weight || null, height: bodyDraft.height || null, body_fat: bodyDraft.body_fat || null,
      onboarding_report: onboardingData, complete: true
    };
    await api(`/api/clients/${clientId}/personal-info`, { method: 'PUT', body: JSON.stringify(payload) });
    await commitModule3Draft(clientId);
    state.onboardingComplete = true;
    _personalInfoLoadedFor = null;
    renderNav();
    setStep(1);
    alert('Datos ingresados correctamente, tu coach te contactara lo antes posible.');
  } catch (e) {
    alert('Error al guardar: ' + e.message);
  }
}

function capturePendingFiles(step) {
  const mod = ONBOARDING_MODULES.find(m => m.n === step);
  if (!mod) return;
  mod.fields.forEach(f => {
    if (f.type !== 'file') return;
    const input = document.getElementById(`field-${f.id}`);
    if (input && input.files && input.files[0]) _pendingOnboardingFiles[f.id] = input.files[0];
  });
}

function restorePendingFileInputs(step) {
  const mod = ONBOARDING_MODULES.find(m => m.n === step);
  if (!mod) return;
  mod.fields.forEach(f => {
    if (f.type !== 'file') return;
    const file = _pendingOnboardingFiles[f.id];
    const input = document.getElementById(`field-${f.id}`);
    if (!file || !input) return;
    try {
      const dt = new DataTransfer();
      dt.items.add(file);
      input.files = dt.files;
    } catch (e) { /* navegador sin soporte para DataTransfer en inputs de archivo */ }
  });
}

function cleanConditionalFields(step) {
  const rules = [
    { id: 'supps_active', value: 'Sí', target: 'supps_list' },
    { id: 'probiotics', value: 'Sí', target: 'probiotics_types' },
  ];
  rules.forEach(rule => {
    const input = document.getElementById(`field-${rule.id}`);
    if (!input) return;
    const show = input.value === rule.value;
    if (!show) {
      onboardingData[rule.target] = Array.isArray(onboardingData[rule.target]) ? [] : '';
      onboardingData[`${rule.target}_otro`] = '';
    }
  });
}

async function m1Init() {
  if (!_m1Countries) {
    const r = await api('/api/countries');
    _m1Countries = r.data || { priority: [], rest: [] };
  }
  const sel = document.getElementById('m1-pais');
  if (!sel) return;
  const cur = onboardingData.country || '';
  const makeOpt = c => `<option value="${c.isoCode}" ${cur === c.isoCode ? 'selected' : ''}>${c.flag} ${c.name}</option>`;
  let opts = '<option value="">Selecciona tu país…</option>';
  opts += `<optgroup label="Países frecuentes">${(_m1Countries.priority || []).map(makeOpt).join('')}</optgroup>`;
  opts += `<optgroup label="Todos los países">${(_m1Countries.rest || []).map(makeOpt).join('')}</optgroup>`;
  sel.innerHTML = opts;

  m1PopulatePhoneCodes();
  const numInput = document.getElementById('m1-phone-num');
  if (numInput) {
    const stored = onboardingData.phone_number || '';
    const m = stored.match(/^\+\d+\s(.*)$/);
    numInput.value = m ? m[1] : stored;
  }
  if (cur) m1LoadCities(cur, onboardingData.city || '');
}

function m1PopulatePhoneCodes() {
  const sel = document.getElementById('m1-phone-code');
  if (!sel || !_m1Countries) return;
  const savedMatch = (onboardingData.phone_number || '').match(/^(\+\d+)/);
  const savedCode = savedMatch ? savedMatch[1] : (onboardingData.phone_code || '+57');
  const all = (_m1Countries.priority || []).concat(_m1Countries.rest || []);
  const seen = {};
  sel.innerHTML = all.filter(c => c.phonecode && !seen[c.phonecode] && (seen[c.phonecode] = 1))
    .map(c => `<option value="+${c.phonecode}" ${savedCode === '+' + c.phonecode ? 'selected' : ''}>${c.flag} +${c.phonecode}</option>`).join('');
}

async function m1LoadCities(isoCode, preselected) {
  const input = document.getElementById('m1-city');
  if (!input) return;
  input.disabled = false; input.style.opacity = '1';
  if (!_m1CitiesCache[isoCode]) {
    input.placeholder = 'Cargando ciudades…';
    const r = await api('/api/cities/' + isoCode);
    _m1CitiesCache[isoCode] = r.data || [];
  }
  input.placeholder = 'Busca tu ciudad…';
  if (preselected) input.value = preselected;
}

function m1FilterCities(input) {
  const iso = (document.getElementById('m1-pais') || {}).value;
  const existing = document.getElementById('m1-city-dropdown');
  if (existing) existing.remove();
  if (!iso || !_m1CitiesCache[iso]) return;
  const q = input.value.toLowerCase().trim();
  const filtered = _m1CitiesCache[iso].filter(c => c.toLowerCase().startsWith(q)).slice(0, 15);
  if (!filtered.length) return;
  const dd = document.createElement('div');
  dd.id = 'm1-city-dropdown';
  dd.className = 'city-dropdown';
  dd.innerHTML = filtered.map(c => `<div class="city-dropdown-item" onmousedown="m1SelectCity('${c.replace(/'/g,"\\'")}')">${c}</div>`).join('');
  input.parentNode.style.position = 'relative';
  input.parentNode.appendChild(dd);
}

function m1SelectCity(name) {
  const input = document.getElementById('m1-city');
  input.value = name;
  onboardingData.city = name;
  const dd = document.getElementById('m1-city-dropdown');
  if (dd) dd.remove();
}

function m1OnCountryChange(sel) {
  const iso = sel.value;
  onboardingData.country = iso;
  const cityInput = document.getElementById('m1-city');
  cityInput.value = ''; onboardingData.city = '';
  if (!iso) {
    cityInput.disabled = true; cityInput.style.opacity = '.4';
    cityInput.placeholder = 'Primero selecciona tu país';
    return;
  }
  m1LoadCities(iso);
}

async function initModule3() {

      api(`/api/clients/${clientId}/anthropometrics`),
      api(`/api/clients/${clientId}/photos`),
      api(`/api/clients/${clientId}/inbody-records`)
    ]);
    window._m3Records = records;
    window._m3Photos = photos;
    window._m3InbodyRecords = inbodyRecords;
    const allMonthNums = [
      ...records.map(r => Number(r.mes_num) || 0),
      ...photos.map(p => Number(p.mes_num) || 0),
      ...inbodyRecords.map(r => Number(r.mes_num) || 0),
    ];
    const maxMonthNum = Math.max(0, ...allMonthNums);
    window._m3NextMonthNum = maxMonthNum + 1;

    ['weight-month-label', 'm3-month-label', 'am-month-label', 'photo-month-label'].forEach(id => {
      const labelEl = document.getElementById(id);

    });

  } catch (e) { console.error(e); }
}
