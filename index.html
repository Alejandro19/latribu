<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>La Tribu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#FBF7F1; --paper:#FFFFFF; --ink:#2B2420; --ink-soft:#6B6058;
  --terracota:#C1662F; --terracota-soft:#F1DDCB; --sage:#6B8F71; --sage-soft:#E3EDE3;
  --gold:#D9A441; --line:#E9E1D6; --danger:#C1462F; --radius:18px;
}
*{box-sizing:border-box;}
body{margin:0;font-family:'Inter',sans-serif;background:var(--cream);color:var(--ink);}
h1,h2,h3,.serif{font-family:'Fraunces',serif;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}
.hidden{display:none !important;}
.stepper-group{display:flex;align-items:center;gap:8px;background:linear-gradient(135deg, #f5e4d4, #fbf3ee);border:1px solid #d9a441;border-radius:18px;overflow:hidden;width:max-content;box-shadow:0 8px 20px rgba(209, 161, 99, 0.15);}
.stepper-group input{width:90px;border:none;background:transparent;text-align:center;font-weight:700;color:var(--ink);}
.stepper-btn{border:none;background:var(--sage);color:#fff;width:40px;height:40px;border-radius:12px;cursor:pointer;transition:transform .15s ease, filter .15s ease;box-shadow:0 6px 18px rgba(107,143,113,0.18);}
.stepper-btn:hover{transform:translateY(-1px);filter:brightness(1.05);}
.stepper-field .stepper-group{border-color:var(--gold);}
.field.invalid label{color:var(--danger);}
.field.invalid input,.field.invalid select,.field.invalid textarea{border-color:var(--danger);}
.accordion{border:1px solid var(--line);border-radius:18px;overflow:hidden;background:var(--paper);}
.accordion-item{border-bottom:1px solid var(--line);}
.accordion-item:last-child{border-bottom:none;}
.accordion-header{width:100%;text-align:left;padding:16px 18px;background:var(--cream);border:none;cursor:pointer;font-weight:700;display:flex;justify-content:space-between;align-items:center;font-size:15px;}
.accordion-content{display:none;padding:18px 18px 12px;background:var(--paper);}
.accordion-content.active{display:block;}
.accordion-toggle{font-size:14px;color:var(--terracota);}
.conditional-hidden{display:none !important;}

/* Login */
#login-view{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.login-card{background:var(--paper);border-radius:var(--radius);padding:48px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(43,36,32,.08);border:1px solid var(--line);}
.login-card h1{font-size:32px;margin:0 0 6px;color:var(--terracota);}
.login-card p.sub{color:var(--ink-soft);margin:0 0 32px;}
.field{margin-bottom:18px;}
.field label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--ink-soft);}
.field input, .field select, .field textarea{width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--line);background:var(--cream);font-size:15px;}
.field input:focus, .field select:focus, .field textarea:focus{outline:2px solid var(--terracota);outline-offset:1px;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 22px;border-radius:999px;border:none;font-weight:600;font-size:15px;transition:transform .15s ease;}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--terracota);color:#fff;width:100%;}
.btn-secondary{background:var(--sage-soft);color:var(--sage);}
.btn-ghost{background:transparent;color:var(--ink-soft);border:1px solid var(--line);}
.btn-danger{background:var(--terracota-soft);color:var(--danger);}
.error-msg{background:#FBEAE3;color:var(--danger);padding:10px 14px;border-radius:10px;font-size:14px;margin-bottom:16px;}
.success-msg{background:#E9F2E9;color:var(--sage);padding:10px 14px;border-radius:10px;font-size:14px;margin-bottom:16px;}
.link-btn{background:none;border:none;color:var(--terracota);font-weight:600;text-decoration:underline;padding:0;}

/* App shell */
#app-view{display:none;min-height:100vh;}
#app-view.active{display:flex;}
.sidebar{width:250px;background:var(--paper);border-right:1px solid var(--line);padding:28px 18px;display:flex;flex-direction:column;flex-shrink:0;}
.brand{font-size:22px;color:var(--terracota);margin:0 8px 30px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:12px;color:var(--ink-soft);font-weight:600;font-size:14px;margin-bottom:4px;background:none;border:none;width:100%;text-align:left;}
.nav-item:hover{background:var(--cream);}
.nav-item.active{background:var(--terracota-soft);color:var(--terracota);}
.sidebar-footer{margin-top:auto;padding:14px;}
.user-chip{font-size:13px;color:var(--ink-soft);margin-bottom:10px;padding:0 4px;}
.main{flex:1;padding:36px 44px;overflow-y:auto;max-height:100vh;}
.page-header{margin-bottom:28px;}
.page-header h2{font-size:28px;margin:0 0 6px;}
.page-header p{color:var(--ink-soft);margin:0;}

.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:26px;margin-bottom:20px;}
.card-title{font-size:18px;font-weight:700;margin:0 0 16px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
@media(max-width:800px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr;}}

.chip{display:inline-flex;align-items:center;padding:8px 14px;border-radius:999px;border:1px solid var(--line);background:var(--cream);font-size:13px;font-weight:600;margin:4px 6px 4px 0;cursor:pointer;color:var(--ink-soft);}
.chip.selected{background:var(--terracota);border-color:var(--terracota);color:#fff;}

.city-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--paper);border:1px solid var(--line);border-radius:10px;max-height:200px;overflow-y:auto;z-index:20;box-shadow:0 8px 24px rgba(43,36,32,.12);margin-top:4px;}
.city-dropdown-item{padding:10px 14px;font-size:14px;cursor:pointer;}
.city-dropdown-item:hover{background:var(--cream);}
.bf-drop{border:2px dashed var(--line);border-radius:14px;padding:22px;text-align:center;cursor:pointer;color:var(--ink-soft);font-weight:600;background:var(--cream);}
.bf-drop:hover{border-color:var(--terracota);color:var(--terracota);}

.wizard-steps{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:24px;}
.wizard-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;background:var(--cream);color:var(--ink-soft);border:1px solid var(--line);}
.wizard-dot.done{background:var(--sage);color:#fff;border-color:var(--sage);}
.wizard-dot.current{background:var(--terracota);color:#fff;border-color:var(--terracota);}

.list-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--line);}
.list-row:last-child{border-bottom:none;}
.badge{padding:4px 10px;border-radius:999px;font-size:12px;font-weight:700;background:var(--sage-soft);color:var(--sage);}
.badge.warn{background:var(--terracota-soft);color:var(--terracota);}
table{width:100%;border-collapse:collapse;}
th{text-align:left;font-size:12px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;padding:10px 8px;border-bottom:1px solid var(--line);}
td{padding:12px 8px;border-bottom:1px solid var(--line);font-size:14px;}
.small-btn{padding:6px 12px;font-size:13px;border-radius:999px;border:1px solid var(--line);background:var(--cream);}
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;}
@media(max-width:900px){.kpi-row{grid-template-columns:repeat(2,1fr);}}
.kpi-tile{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:18px;text-align:center;}
.kpi-tile .val{font-size:26px;font-weight:700;color:var(--terracota);}
.kpi-tile .lbl{font-size:12px;color:var(--ink-soft);margin-top:4px;}
.photo-thumb{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:12px;border:1px solid var(--line);cursor:zoom-in;}
.photo-preview-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:1000;cursor:zoom-out;padding:24px;}
.photo-preview-box{max-width:min(600px,90vw);max-height:90vh;text-align:center;}
.photo-preview-box img{max-width:100%;max-height:80vh;border-radius:12px;object-fit:contain;}
.photo-preview-box p{color:#fff;font-size:14px;margin-top:10px;}
.empty-state{text-align:center;padding:40px 20px;color:var(--ink-soft);}
</style>
</head>
<body>

<div id="login-view">
  <div class="login-card">
    <h1>La Tribu</h1>
    <p class="sub">Comunidad de bienestar y alto rendimiento.</p>
    <div id="login-error"></div>
    <div id="login-form">
      <div class="field"><label>Email</label><input type="email" id="login-email" placeholder="tucorreo@ejemplo.com"></div>
      <div class="field"><label>Contraseña</label><input type="password" id="login-password" placeholder="••••••••"></div>
      <button class="btn btn-primary" onclick="handleLogin()">Ingresar</button>
      <p style="text-align:center;margin-top:18px;font-size:14px;color:var(--ink-soft);">
        ¿Aún no tienes cuenta? <button class="link-btn" onclick="showRegister()">Regístrate</button>
      </p>
    </div>
    <div id="register-form" class="hidden">
      <div class="field"><label>Nombre completo</label><input type="text" id="reg-name"></div>
      <div class="field"><label>Email</label><input type="email" id="reg-email"></div>
      <div class="field"><label>Contraseña</label><input type="password" id="reg-password"></div>
      <button class="btn btn-primary" onclick="handleRegister()">Crear cuenta</button>
      <p style="text-align:center;margin-top:18px;font-size:14px;color:var(--ink-soft);">
        <button class="link-btn" onclick="showLogin()">Volver a iniciar sesión</button>
      </p>
    </div>
  </div>
</div>

<div id="app-view">
  <div class="sidebar">
    <h2 class="brand">La Tribu</h2>
    <div id="nav-items"></div>
    <div class="sidebar-footer">
      <div class="user-chip" id="user-chip"></div>
      <button class="btn btn-ghost" style="width:100%" onclick="logout()">Cerrar sesión</button>
    </div>
  </div>
  <div class="main" id="main-content"></div>
</div>

<script>
const API = '';
let state = { token: localStorage.getItem('lt_token') || null, role: null, user: null, permissions: {}, clientType: null, onboardingComplete: false, notifications: [], view: 'personal-info', clients: [], currentClientId: null, wizardStep: 1 };

async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
  if (state.token && !(opts.body instanceof FormData)) headers['Authorization'] = `Bearer ${state.token}`;
  else if (state.token) headers['Authorization'] = `Bearer ${state.token}`;
  const finalOpts = { ...opts, headers };
  if (opts.body instanceof FormData) delete finalOpts.headers['Content-Type'];
  const res = await fetch(API + path, finalOpts);
  const data = await res.json().catch(() => ({}));
  if (res.status === 402 && state.role === 'cliente') {
    state.planExpired = true;
    renderPlanExpiredScreen();
  }
  if (!res.ok || data.success === false) throw new Error(data.error || 'Error de red.');
  return data;
}

function showRegister(){ document.getElementById('login-form').classList.add('hidden'); document.getElementById('register-form').classList.remove('hidden'); }
function showLogin(){ document.getElementById('register-form').classList.add('hidden'); document.getElementById('login-form').classList.remove('hidden'); }

async function handleLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errBox = document.getElementById('login-error');
  errBox.innerHTML = '';
  try {
    const data = await api('/api/auth/login', { method: 'POST', body: JSON.stringify({ email, password }) });
    onAuthSuccess(data);
  } catch (e) {
    errBox.innerHTML = `<div class="error-msg">${e.message}</div>`;
  }
}

async function handleRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const errBox = document.getElementById('login-error');
  errBox.innerHTML = '';
  try {
    const data = await api('/api/auth/register', { method: 'POST', body: JSON.stringify({ name, email, password }) });
    errBox.innerHTML = `<div class="success-msg">${data.message || 'Cuenta creada, pendiente de activación.'}</div>`;
    showLogin();
  } catch (e) {
    errBox.innerHTML = `<div class="error-msg">${e.message}</div>`;
  }
}

function onAuthSuccess(data) {
  state.token = data.token;
  state.role = data.role;
  state.user = data.user;
  state.permissions = data.permissions || {};
  state.clientType = data.clientType || null;
  state.onboardingComplete = !!data.onboardingComplete;
  state.planExpired = !!data.planExpired;
  state.planEndDate = data.planEndDate || null;
  localStorage.setItem('lt_token', data.token);
  if (data.role === 'admin') state.view = 'admin-clients';
  else state.view = (CLIENT_NAV.find(item => item.visible(state)) || CLIENT_NAV[0]).key;
  boot();
}

function logout() {
  localStorage.removeItem('lt_token');
  state = { token: null, role: null, user: null, permissions: {}, clientType: null, onboardingComplete: false, planExpired: false, planEndDate: null, notifications: [], view: 'personal-info', clients: [], currentClientId: null, wizardStep: 1 };
  document.getElementById('app-view').classList.remove('active');
  document.getElementById('login-view').style.display = 'flex';
}

async function boot() {
  if (!state.token) return;
  try {
    const data = await api('/api/auth/me');
    state.role = data.role; state.user = data.user; state.permissions = data.permissions || {}; state.clientType = data.clientType || null; state.onboardingComplete = !!data.onboardingComplete;
    state.planExpired = !!data.planExpired; state.planEndDate = data.planEndDate || null;
    document.getElementById('login-view').style.display = 'none';
    document.getElementById('app-view').classList.add('active');
    if (state.role === 'cliente' && state.planExpired) {
      renderPlanExpiredScreen();
      return;
    }
    if (!state.view || (state.view === 'personal-info' && state.role === 'admin')) state.view = 'admin-clients';
    if (state.role === 'cliente' && !CLIENT_NAV.some(item => item.key === state.view && item.visible(state))) {
      state.view = (CLIENT_NAV.find(item => item.visible(state)) || CLIENT_NAV[0]).key;
    }
    if (state.role === 'admin') {
      try { const { notifications } = await api('/api/admin/notifications'); state.notifications = notifications; } catch (e) { state.notifications = []; }
    }
    renderNav();
    renderMain();
  } catch (e) {
    logout();
  }
}

// ---------------- Navigation ----------------

const CLIENT_NAV = [
  { key: 'personal-info', label: 'Información Personal', visible: s => s.clientType !== 'lead_wellness' },
  { key: 'training', label: 'Entrenamiento', visible: s => s.clientType !== 'lead_wellness' && s.permissions?.training === true },
  { key: 'nutrition', label: 'Nutrición', visible: s => s.clientType !== 'lead_wellness' && s.permissions?.nutrition === true },
  { key: 'supplementation', label: 'Suplementación', visible: s => s.clientType !== 'lead_wellness' && s.permissions?.supplementation === true },
  { key: 'cortisol', label: 'Gestión de Cortisol', visible: s => s.permissions?.cortisol === true },
  { key: 'community', label: 'Comunidad', visible: s => s.clientType === 'lead_wellness' ? s.permissions?.community === true : s.onboardingComplete === true },
  { key: 'evolution', label: 'Mi Evolución', visible: s => s.clientType !== 'lead_wellness' && s.onboardingComplete === true },
];
const ADMIN_NAV = [
  { key: 'admin-clients', label: 'Clientes' },
  { key: 'admin-community', label: 'Comunidad' },
  { key: 'admin-notifications', label: 'Notificaciones' },
];
const CLIENT_TYPE_LABELS = { coaching_1_1: 'Coaching 1:1', coaching_online: 'Coaching Online', lead_wellness: 'Leads Wellness' };

function renderNav() {
  if (state.role === 'admin') {
    const unread = (state.notifications || []).filter(n => !n.read).length;
    document.getElementById('nav-items').innerHTML = ADMIN_NAV.map(item => `
      <button class="nav-item ${state.view === item.key ? 'active' : ''}" onclick="setView('${item.key}')">${item.label}${item.key === 'admin-notifications' && unread ? ` <span class="badge">${unread}</span>` : ''}</button>
    `).join('');
  } else {
    document.getElementById('nav-items').innerHTML = CLIENT_NAV.filter(item => item.visible(state)).map(item => `
      <button class="nav-item ${state.view === item.key ? 'active' : ''}" onclick="setView('${item.key}')">${item.label}</button>
    `).join('');
  }
  document.getElementById('user-chip').innerText = `${state.user?.name || ''} · ${state.role === 'admin' ? 'Admin' : 'Miembro'}`;
}

function renderPlanExpiredScreen() {
  document.getElementById('nav-items').innerHTML = '';
  document.getElementById('user-chip').innerText = `${state.user?.name || ''} · Miembro`;
  const endDate = state.planEndDate ? new Date(state.planEndDate + 'T00:00:00').toLocaleDateString() : '';
  document.getElementById('main-content').innerHTML = `
    <div class="card" style="max-width:480px;margin:60px auto;text-align:center;">
      <div class="card-title">Tu plan ha vencido</div>
      <p style="color:var(--ink-soft);">${endDate ? `Tu membresía venció el ${endDate}. ` : ''}Contacta a tu coach para renovar tu plan y recuperar el acceso a la plataforma.</p>
    </div>
  `;
}

function setView(view, extra) {
  state.view = view;
  if (extra) Object.assign(state, extra);
  renderNav();
  renderMain();
}

function renderMain() {
  const el = document.getElementById('main-content');
  el.innerHTML = '<div class="empty-state">Cargando…</div>';
  const routes = {
    'personal-info': renderPersonalInfo,
    'training': renderTraining,
    'nutrition': renderNutrition,
    'supplementation': renderSupplementation,
    'cortisol': renderCortisol,
    'community': renderCommunity,
    'evolution': renderEvolution,
    'admin-clients': renderAdminClients,
    'admin-client-detail': renderAdminClientDetail,
    'admin-community': renderAdminCommunity,
    'admin-notifications': renderAdminNotifications,
  };
  (routes[state.view] || renderPersonalInfo)(el);
}

function currentClientId() {
  return state.role === 'admin' ? state.currentClientId : state.user.id;
}

// ---------------- Módulo: Información Personal (wizard, diseño propio) ----------------

const ONBOARDING_MODULES = [
  { n: 1, title: 'Perfil Personal', custom: 'country', fields: [
    { id: 'birthdate', label: 'Fecha de nacimiento', type: 'date', required: true },
    { id: 'gender', label: 'Género', type: 'select', options: ['Masculino', 'Femenino', 'Otro'], required: true },
    { id: 'occupation', label: 'Ocupación', type: 'text', required: true },
    { id: 'marital_status', label: 'Estado civil', type: 'select', options: ['Soltero/a', 'Casado/a', 'Unión libre', 'Divorciado/a'], required: true },
  ]},
  { n: 2, title: 'Vida Profesional', fields: [
    { id: 'work_hours', label: '¿Horas de trabajo al día?', type: 'stepper', required: true },
    { id: 'cognitive_demand', label: '¿Demanda cognitiva (1-10)?', type: 'stepper', required: true },
    { id: 'travel', label: '¿Con qué frecuencia viajas por trabajo?', type: 'select', options: ['Nunca', '1-2 veces al mes', 'Semanal', 'Muy frecuente'], required: true },
    { id: 'work_place', label: '¿Dónde trabajas principalmente?', type: 'select', options: ['Oficina', 'Remoto', 'Híbrido', 'Campo/Obra'], required: true },
    { id: 'time_control', label: '¿Tienes control sobre tu horario?', type: 'select', options: ['Alto', 'Medio', 'Bajo'], required: true },
  ]},
  { n: 3, title: 'Composición Corporal', custom: 'body', fields: [] },
  { n: 4, title: 'Historial de Salud', fields: [
    { id: 'condition', label: 'Condición médica diagnosticada', type: 'select', options: ['Ninguna', 'Diabetes', 'Hipertensión', 'Hipotiroidismo', 'Síndrome metabólico', 'PCOS', 'Otra'], required: true },
    { id: 'condition_other', label: 'Especifica la condición médica', type: 'text', required: true },
    { id: 'meds', label: '¿Tomas medicamentos actualmente?', type: 'select', options: ['No', 'Sí'], required: true },
    { id: 'meds_detail', label: '¿Para qué te lo recetaron?', type: 'text', required: true },
    { id: 'allergies', label: 'Alergias', type: 'text', required: true },
    { id: 'injury', label: 'Pre existencias medicas o Lesiones', type: 'text', required: true },
    { id: 'intervention_surgery', label: '¿Intervenciones quirúrgicas?', type: 'select', options: ['No', 'Sí'], required: true },
    { id: 'intervention_surgery_detail', label: 'Describe la intervención quirúrgica', type: 'text', required: true },
    { id: 'last_checkup', label: 'Último chequeo médico', type: 'select', options: ['Menos de 6 meses', '1 año', '2+ años', 'Nunca'], required: true },
    { id: 'checkup_file', label: 'Subir chequeo médico', type: 'file' },
    { id: 'checkup_notes', label: 'Observaciones del chequeo', type: 'textarea', required: true },
    { id: 'mental_health', label: 'Salud mental diagnosticada', type: 'select', options: ['Sin diagnóstico', 'Ansiedad', 'Depresión', 'TDAH', 'Burnout', 'Otro'], required: true },
    { id: 'mental_health_other', label: 'Especifica la salud mental', type: 'text', required: true },
    { id: 'medical_clearance', label: '¿Tienes autorización médica para entrenar?', type: 'select', options: ['No', 'Sí'], required: true },
    { id: 'goal_reasons', label: 'Escribe 3 razones por las que quieres alcanzar tu objetivo', type: 'textarea', required: true },
  ]},
  { n: 5, title: 'Alimentación', fields: [
    { id: 'meals_per_day', label: '¿Cuántas comidas haces al día?', type: 'number', required: true },
    { id: 'first_meal', label: '¿A qué hora es tu primera comida?', type: 'time', required: true },
    { id: 'last_meal', label: '¿A qué hora es tu última comida?', type: 'time', required: true },

let onboardingData = {};
// El wizard de Información Personal siempre arranca en blanco (es un registro recurrente,
// no un formulario que se pre-llena con lo último guardado) — el histórico vive solo en la
// base de datos. Mientras el cliente navega Continuar/Anterior dentro de una misma sesión,
// todo vive en memoria (onboardingData + los borradores de módulo 3 / archivos pendientes);
// se reinicia por completo al hacer clic en "Finalizar" o al cambiar de cliente.
let _personalInfoLoadedFor = null;
let _pendingOnboardingFiles = {};

function renderPersonalInfo(el) {
  const clientId = currentClientId();
  if (_personalInfoLoadedFor !== clientId) {
    onboardingData = {};
    _personalInfoLoadedFor = clientId;
    _pendingOnboardingFiles = {};
    window._m3Draft = null;
    window._m3DraftClientId = null;
  }
  renderPersonalInfoBody(el);
}

function renderPersonalInfoBody(el) {
  const step = state.wizardStep || 1;
  const mod = ONBOARDING_MODULES.find(m => m.n === step);
  const saveFn = mod.custom === 'country' ? 'saveModule1()' : mod.custom === 'body' ? 'saveModule3()' : `saveOnboardingStep(${step})`;
  el.innerHTML = `
    <div class="page-header">
      <h2>Información Personal</h2>
      <p>Conocerte nos permite diseñar tu experiencia dentro de La Tribu.</p>
    </div>
    <div class="wizard-steps">
      ${ONBOARDING_MODULES.map(m => `<div class="wizard-dot ${m.n < step ? 'done' : ''} ${m.n === step ? 'current' : ''}" onclick="setStep(${m.n})">${m.n}</div>`).join('')}
    </div>
    <div class="card">
      <div class="card-title">Módulo ${mod.n} · ${mod.title}</div>
      <div class="grid-2" id="module-fields">
        ${mod.fields.map(f => renderField(f)).join('')}
      </div>
      ${mod.custom === 'country' ? renderCountryBlock() : ''}
      ${mod.custom === 'body' ? renderBodyModuleBlock() : ''}
      <div style="display:flex;justify-content:space-between;margin-top:24px;">
        <button class="btn btn-ghost" ${step === 1 ? 'disabled style="opacity:.4"' : ''} onclick="setStep(${step - 1})">Anterior</button>
        <button class="btn btn-primary" style="width:auto" onclick="${saveFn}">${step === 9 ? 'Finalizar' : 'Continuar'}</button>
      </div>
    </div>
  `;
  if (mod.custom === 'country') m1Init();
  if (mod.custom === 'body') initModule3();
  initFieldDependencies(step);
  restorePendingFileInputs(step);

  document.querySelectorAll('#module-fields .field input, #module-fields .field select, #module-fields .field textarea').forEach(el => {
    el.addEventListener('input', () => clearFieldError(el));
    el.addEventListener('change', () => clearFieldError(el));
  });
}

function renderField(f) {
  const val = onboardingData[f.id];
  if (f.type === 'select') {
    return `<div class="field"><label>${f.label}</label><select id="field-${f.id}">
      <option value="">Selecciona…</option>
      ${f.options.map(o => `<option value="${o}" ${val === o ? 'selected' : ''}>${o}</option>`).join('')}
    </select></div>`;
  }
  if (f.type === 'stepper') {
    return `<div class="field"><label>${f.label}</label><div class="stepper-group">
      <button type="button" class="stepper-btn" onclick="changeStepper('${f.id}', -1)">-</button>
      <input type="number" id="field-${f.id}" value="${val ?? 0}" min="0" readonly>
      <button type="button" class="stepper-btn" onclick="changeStepper('${f.id}', 1)">+</button>
    </div></div>`;
  }
  if (f.type === 'chips') {
    const selected = Array.isArray(val) ? val : [];
    return `<div class="field" id="field-${f.id}" style="grid-column:1 / -1;">
      <label>${f.label}</label>
      <div>${f.options.map(o => `<span class="chip ${selected.includes(o) ? 'selected' : ''}" onclick="toggleChip('${f.id}','${o.replace(/'/g,"\\'")}')">${o}</span>`).join('')}</div>
      ${selected.includes('Otro') ? `<input type="text" style="margin-top:8px" placeholder="Especifica…" id="field-${f.id}-otro" value="${onboardingData[f.id + '_otro'] || ''}">` : ''}
    </div>`;
  }
  return `<div class="field"><label>${f.label}</label><input type="${f.type}" id="field-${f.id}" value="${val ?? ''}"></div>`;
}

function toggleChip(fieldId, option) {
  syncStepFieldsFromDOM(state.wizardStep);
  const cur = Array.isArray(onboardingData[fieldId]) ? onboardingData[fieldId].slice() : [];
  const idx = cur.indexOf(option);
  if (idx >= 0) cur.splice(idx, 1); else cur.push(option);
  onboardingData[fieldId] = cur;
  renderPersonalInfoBody(document.getElementById('main-content'));
}

function changeStepper(fieldId, delta) {
  const input = document.getElementById(`field-${fieldId}`);
  if (!input) return;
  const current = Number(input.value) || 0;
  const next = Math.max(0, current + delta);
  input.value = next;
  onboardingData[fieldId] = String(next);
}

function initFieldDependencies(step) {
  const update = () => {
    const rules = [
        { id: 'condition', value: 'Otra', target: 'condition_other' },
      { id: 'mental_health', value: 'Otro', target: 'mental_health_other' },
      { id: 'snacks', values: ['A veces', 'Siempre'], target: 'snacks_qty' },
      { id: 'alcohol', notValue: 'Nunca', target: 'alcohol_type' },
      { id: 'substances', value: 'Otra', target: 'substances_detail' },
      { id: 'substances', values: ['Tabaco', 'Alcohol frecuente', 'Cannabis', 'Esteroides'], target: 'substances_frequency' },
      { id: 'supps_active', value: 'Sí', target: 'supps_list' },
      { id: 'probiotics', value: 'Sí', target: 'probiotics_types' },
      { id: 'sports_active', value: 'Sí', target: 'sports_detail' },
      { id: 'intervention_surgery', value: 'Sí', target: 'intervention_surgery_detail' },
      { id: 'meds', value: 'Sí', target: 'meds_detail' },
      { id: 'medical_clearance', value: 'Sí', target: null }
    ];
    rules.forEach(rule => {
      const el = document.getElementById(`field-${rule.id}`);
      const target = rule.target ? document.getElementById(`field-${rule.target}`) : null;
      if (!el || !target) return;
      const val = el.value;
      const show = rule.values ? rule.values.includes(val) : rule.notValue ? val !== rule.notValue && val !== '' : val === rule.value;
      const fieldWrapper = target.closest('.field');
      if (fieldWrapper) fieldWrapper.classList.toggle('conditional-hidden', !show);
      if (!show && rule.target) {
        onboardingData[rule.target] = Array.isArray(onboardingData[rule.target]) ? [] : '';
        onboardingData[`${rule.target}_otro`] = '';
      }
    });
  };

  const watchIds = ['condition', 'mental_health', 'snacks', 'alcohol', 'substances', 'supps_active', 'probiotics', 'sports_active', 'intervention_surgery', 'meds'];
  watchIds.forEach(id => {
    const el = document.getElementById(`field-${id}`);
    if (!el) return;
    el.addEventListener('change', update);
    el.addEventListener('input', update);
  });
  update();
}

function openPhotoPreview(url, caption) {
  const overlay = document.createElement('div');
  overlay.className = 'photo-preview-overlay';
  overlay.onclick = () => overlay.remove();
  overlay.innerHTML = `<div class="photo-preview-box"><img src="${url}"><p>${caption || ''}</p></div>`;
  document.body.appendChild(overlay);
}

function toggleAccordion(button) {
  const item = button.closest('.accordion-item');
  const content = item.querySelector('.accordion-content');
  const active = content.classList.contains('active');
  document.querySelectorAll('.accordion-content').forEach(c => c.classList.remove('active'));
  if (!active) content.classList.add('active');
}

function syncStepFieldsFromDOM(step) {
  const mod = ONBOARDING_MODULES.find(m => m.n === step);
  if (!mod) return;
  mod.fields.forEach(f => {
    if (f.type === 'chips') {
      const otroInput = document.getElementById(`field-${f.id}-otro`);
      if (otroInput) onboardingData[f.id + '_otro'] = otroInput.value;
      return;
    }
    const input = document.getElementById(`field-${f.id}`);
    if (!input) return;
    if (f.type === 'file') {
      if (input.files && input.files[0]) {
        onboardingData[f.id] = input.files[0].name;
      }
      return;
    }
    onboardingData[f.id] = input.value;
  });
}

function clearFieldError(el) {
  const wrapper = el.closest('.field');
  if (wrapper) wrapper.classList.remove('invalid');
}

function validateStep(step) {
  const mod = ONBOARDING_MODULES.find(m => m.n === step);
  if (!mod) return true;
  let valid = true;
  for (const f of mod.fields) {
    if (f.type === 'file') continue;
    if (!f.required) continue;
    const el = document.getElementById(`field-${f.id}`);
    if (!el) continue;
    const wrapper = el.closest('.field');
    if (wrapper && wrapper.classList.contains('conditional-hidden')) {
      if (wrapper) wrapper.classList.remove('invalid');
      continue;
    }
    const isEmpty = f.type === 'chips'
      ? !(Array.isArray(onboardingData[f.id]) && onboardingData[f.id].length > 0)
      : String(el.value || '').trim() === '';
    if (isEmpty) {
      if (wrapper) wrapper.classList.add('invalid');
      valid = false;
    } else {
      if (wrapper) wrapper.classList.remove('invalid');
    }
  }
  return valid;
}

async function uploadPendingFiles(clientId) {
  const file = _pendingOnboardingFiles.checkup_file;
  if (!file) return;
  const formData = new FormData();
  formData.append('checkup_file', file);
  formData.append('onboarding_report', JSON.stringify(onboardingData));
  const result = await api(`/api/clients/${clientId}/personal-info-file`, { method: 'POST', body: formData });
  onboardingData.checkup_file_url = result.file_url;
  onboardingData.checkup_file_name = result.file_name;
  onboardingData.checkup_uploaded_at = result.uploaded_at;
  _pendingOnboardingFiles = {};
}

function setStep(n) {
  if (n < 1 || n > 9) return;
  state.wizardStep = n;
  renderMain();
}

async function saveOnboardingStep(step) {
  if (!validateStep(step)) return;
  syncStepFieldsFromDOM(step);
  cleanConditionalFields(step);
  capturePendingFiles(step);
  if (step < 9) {
    setStep(step + 1);
    return;
  }
  // Finalizar: único momento en que todo el wizard se guarda de forma definitiva.
  const clientId = currentClientId();
  try {
    await uploadPendingFiles(clientId);
    const bodyDraft = window._m3Draft || {};
    const payload = {
      birthdate: onboardingData.birthdate, gender: onboardingData.gender,
      occupation: onboardingData.occupation, marital_status: onboardingData.marital_status,
      country: onboardingData.country, city: onboardingData.city,
      phone_code: onboardingData.phone_code, phone_number: onboardingData.phone_number,
      weight: bodyDraft.weight || null, height: bodyDraft.height || null, body_fat: bodyDraft.body_fat || null,
      onboarding_report: onboardingData, complete: true
    };
    await api(`/api/clients/${clientId}/personal-info`, { method: 'PUT', body: JSON.stringify(payload) });
    await commitModule3Draft(clientId);
    state.onboardingComplete = true;
    _personalInfoLoadedFor = null;
    renderNav();
    setStep(1);
    alert('Datos ingresados correctamente, tu coach te contactara lo antes posible.');
  } catch (e) {
    alert('Error al guardar: ' + e.message);
  }
}

function capturePendingFiles(step) {
  const mod = ONBOARDING_MODULES.find(m => m.n === step);
  if (!mod) return;
  mod.fields.forEach(f => {
    if (f.type !== 'file') return;
    const input = document.getElementById(`field-${f.id}`);
    if (input && input.files && input.files[0]) _pendingOnboardingFiles[f.id] = input.files[0];
  });
}

function restorePendingFileInputs(step) {
  const mod = ONBOARDING_MODULES.find(m => m.n === step);
  if (!mod) return;
  mod.fields.forEach(f => {
    if (f.type !== 'file') return;
    const file = _pendingOnboardingFiles[f.id];
    const input = document.getElementById(`field-${f.id}`);
    if (!file || !input) return;
    try {
      const dt = new DataTransfer();
      dt.items.add(file);
      input.files = dt.files;
    } catch (e) { /* navegador sin soporte para DataTransfer en inputs de archivo */ }
  });
}

function cleanConditionalFields(step) {
  const rules = [
    { id: 'supps_active', value: 'Sí', target: 'supps_list' },
    { id: 'probiotics', value: 'Sí', target: 'probiotics_types' },
  ];
  rules.forEach(rule => {
    const input = document.getElementById(`field-${rule.id}`);
    if (!input) return;
    const show = input.value === rule.value;
    if (!show) {
      onboardingData[rule.target] = Array.isArray(onboardingData[rule.target]) ? [] : '';
      onboardingData[`${rule.target}_otro`] = '';
    }
  });
}

async function m1Init() {
  if (!_m1Countries) {
    const r = await api('/api/countries');
    _m1Countries = r.data || { priority: [], rest: [] };
  }
  const sel = document.getElementById('m1-pais');
  if (!sel) return;
  const cur = onboardingData.country || '';
  const makeOpt = c => `<option value="${c.isoCode}" ${cur === c.isoCode ? 'selected' : ''}>${c.flag} ${c.name}</option>`;
  let opts = '<option value="">Selecciona tu país…</option>';
  opts += `<optgroup label="Países frecuentes">${(_m1Countries.priority || []).map(makeOpt).join('')}</optgroup>`;
  opts += `<optgroup label="Todos los países">${(_m1Countries.rest || []).map(makeOpt).join('')}</optgroup>`;
  sel.innerHTML = opts;

  m1PopulatePhoneCodes();
  const numInput = document.getElementById('m1-phone-num');
  if (numInput) {
    const stored = onboardingData.phone_number || '';
    const m = stored.match(/^\+\d+\s(.*)$/);
    numInput.value = m ? m[1] : stored;
  }
  if (cur) m1LoadCities(cur, onboardingData.city || '');
}

function m1PopulatePhoneCodes() {
  const sel = document.getElementById('m1-phone-code');
  if (!sel || !_m1Countries) return;
  const savedMatch = (onboardingData.phone_number || '').match(/^(\+\d+)/);
  const savedCode = savedMatch ? savedMatch[1] : (onboardingData.phone_code || '+57');
  const all = (_m1Countries.priority || []).concat(_m1Countries.rest || []);
  const seen = {};
  sel.innerHTML = all.filter(c => c.phonecode && !seen[c.phonecode] && (seen[c.phonecode] = 1))
    .map(c => `<option value="+${c.phonecode}" ${savedCode === '+' + c.phonecode ? 'selected' : ''}>${c.flag} +${c.phonecode}</option>`).join('');
}

async function m1LoadCities(isoCode, preselected) {
  const input = document.getElementById('m1-city');
  if (!input) return;
  input.disabled = false; input.style.opacity = '1';
  if (!_m1CitiesCache[isoCode]) {
    input.placeholder = 'Cargando ciudades…';
    const r = await api('/api/cities/' + isoCode);
    _m1CitiesCache[isoCode] = r.data || [];
  }
  input.placeholder = 'Busca tu ciudad…';
  if (preselected) input.value = preselected;
}

function m1FilterCities(input) {
  const iso = (document.getElementById('m1-pais') || {}).value;
  const existing = document.getElementById('m1-city-dropdown');

  input.parentNode.style.position = 'relative';
  input.parentNode.appendChild(dd);
}

async function commitModule3Draft(clientId) {
  const draft = window._m3Draft;
  if (!draft || window._m3DraftClientId !== clientId) return;
  const monthNum = window._m3NextMonthNum || 1;

  const { cintura, brazos, hombros, piernas, gluteo } = draft.am;
  if (cintura || brazos || hombros || piernas || gluteo) {
    await api(`/api/clients/${clientId}/anthropometrics`, { method: 'POST', body: JSON.stringify({
      fecha: new Date().toISOString().slice(0, 10), peso: draft.weight || null,
      cintura: cintura || null, brazos: brazos || null, hombros: hombros || null, piernas: piernas || null, gluteo: gluteo || null,
      mes_num: monthNum
    })});
  }

  for (const a of PHOTO_ANGLES) {
    const file = draft.photos[a.key];
    if (!file) continue;
    const fd = new FormData();
    fd.append('photo', file);
    fd.append('angle', a.key);
    fd.append('mes_num', monthNum);
    await api(`/api/clients/${clientId}/photos`, { method: 'POST', body: fd });
  }

  if (draft.inbody.ocrDone && draft.inbody.pesoTotal) {
    await api(`/api/clients/${clientId}/inbody-records`, { method: 'POST', body: JSON.stringify({
      fecha: new Date().toISOString().slice(0, 10),
      version: draft.inbody.version,
      peso_total: draft.inbody.pesoTotal || null,
      smm: draft.inbody.smm || null,
      grasa_pct: draft.inbody.grasaPct || null,
      imc: draft.inbody.imc || null,
      peso_objetivo: draft.inbody.pesoObjetivo || null,
      grasa_visceral: draft.inbody.grasaVisceral || null,
      bmr: draft.inbody.bmr || null,
      angulo_fase: draft.inbody.anguloFase || null,
      ecw_tbw: draft.inbody.ecwTbw || null,
      masa_osea: draft.inbody.masaOsea || null,
      altura: draft.inbody.altura || null,
      mes_num: monthNum
    })});
  }

  window._m3NextMonthNum = monthNum + 1;
  window._m3Draft = null;
  window._m3DraftClientId = null;
}

function renderSimpleBarChart(containerId, dataPoints, opts = {}) {
  const el = document.getElementById(containerId);
  if (!el) return;
  const points = dataPoints.slice().sort((a, b) => a.month - b.month);
  if (!points.length) { el.innerHTML = '<div class="empty-state">Sin datos suficientes.</div>'; return; }
  const unit = opts.unit || '';
  const w = 100, h = 90, padBottom = 16;
  const values = points.map(d => d.value);
  const maxVal = Math.max(...values);
  const minVal = Math.min(0, ...values);
  const range = (maxVal - minVal) || 1;
  const gap = 2;
  const barWidth = Math.min(20, (w - gap * (points.length + 1)) / points.length);
  const totalWidth = barWidth * points.length + gap * (points.length - 1);
  const startX = (w - totalWidth) / 2;
  const bars = points.map((d, i) => {
    const x = startX + i * (barWidth + gap);
    const barH = ((d.value - minVal) / range) * (h - padBottom);
    const y = (h - padBottom) - barH;
    const isLast = i === points.length - 1;
    return `<g>
      <rect x="${x}" y="${y}" width="${barWidth}" height="${Math.max(barH, 1)}" rx="3" fill="var(--terracota)"><title>Mes ${d.month}: ${d.value}${unit}</title></rect>
      ${isLast ? `<text x="${x + barWidth / 2}" y="${Math.max(y - 3, 7)}" font-size="7" text-anchor="middle" fill="var(--ink-soft)">${d.value}${unit}</text>` : ''}
      <text x="${x + barWidth / 2}" y="${h}" font-size="6" text-anchor="middle" fill="var(--ink-soft)">M${d.month}</text>
    </g>`;
  }).join('');
  el.innerHTML = `<svg viewBox="0 0 ${w} ${h + 2}" style="width:100%;height:120px;" preserveAspectRatio="xMidYMid meet">
    <line x1="0" y1="${h - padBottom}" x2="${w}" y2="${h - padBottom}" stroke="var(--line)" stroke-width="0.5"/>
    ${bars}
  </svg>`;
}

async function m3HandlePdf(input) {
  const file = input.files[0]; if (!file) return;
  const st = document.getElementById('m3-ocr-status');
  const clientId = currentClientId();

  if (file.size > 25 * 1024 * 1024) {
    if (st) { st.style.color = 'var(--danger)'; st.textContent = '✗ El archivo excede 25 MB.'; }
    return;
  }
  if (st) { st.style.color = 'var(--sage)'; st.textContent = 'Procesando archivo…'; }

  try {
    const base64 = await new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = (e) => {
        const s = e.target.result;
        const raw = s.includes(',') ? s.split(',')[1] : s;
        if (file.type && file.type.startsWith('image/')) {
          const img = new Image();
          img.onload = () => {
            const MAX = 1600;
            let w = img.width, h = img.height;
            if (w > MAX || h > MAX) { if (w > h) { h = Math.round(h * MAX / w); w = MAX; } else { w = Math.round(w * MAX / h); h = MAX; } }
            const cv = document.createElement('canvas'); cv.width = w; cv.height = h;
            cv.getContext('2d').drawImage(img, 0, 0, w, h);
            try { resolve(cv.toDataURL('image/jpeg', 0.85).split(',')[1]); } catch (ex) { resolve(raw); }
          };
          img.onerror = () => resolve(raw);
          img.src = s;
        } else {
          resolve(raw);
        }
      };
      r.onerror = reject;
      r.readAsDataURL(file);
    });

    if (st) st.textContent = 'Enviando a análisis…';
    const result = await api(`/api/clients/${clientId}/ocr-vision`, { method: 'POST', body: JSON.stringify({ base64 }) });
    const text = result.text || '';
    if (!text.trim()) throw new Error('No se pudo extraer texto. Exporta el reporte como JPG/PNG e intenta de nuevo.');

    const parsed = m3ParseOcrText(text);
    const count = Object.keys(parsed).filter(k => k.charAt(0) !== '_').length;
    if (count === 0) throw new Error('No se detectaron campos. Intenta con una captura JPG/PNG del reporte InBody.');

    const FIELD_MAP = {
      peso_total: 'm3-peso-total', smm: 'm3-smm', grasa_pct: 'm3-grasa-pct',
      peso_objetivo: 'm3-peso-objetivo', grasa_visceral: 'm3-grasa-visceral',
      bmr: 'm3-bmr', angulo_fase: 'm3-angulo-fase', ecw_tbw: 'm3-ecw-tbw',
      masa_osea: 'm3-masa-osea', height: 'm3-height'
    };
    Object.values(FIELD_MAP).forEach(elId => { const el = document.getElementById(elId); if (el) el.value = ''; });
    Object.keys(parsed).forEach(k => {
      const elId = FIELD_MAP[k]; if (!elId) return;
      const el = document.getElementById(elId); if (!el) return;
      el.value = parsed[k];
    });
    m3UpdateIMC();
    window._m3OcrDone = true;
    window._m3InbodyVersion = parsed._version || null;
    const verLbl = document.getElementById('m3-version-label');
    if (parsed._version && verLbl) { verLbl.textContent = 'Detectado: ' + parsed._version; verLbl.style.display = 'block'; }
    if (st) { st.style.color = 'var(--sage)'; st.textContent = '✓ ' + count + ' campos detectados y rellenados'; }
  } catch (e) {
    let msg = e.message || 'Error al procesar el archivo.';
    if (msg.toLowerCase().includes('forbidden') || msg.toLowerCase().includes('cloud vision api no habilitada')) msg = 'Cloud Vision API no habilitada en Google Cloud Console.';
    else if (msg.toLowerCase().includes('no está configurada')) msg = 'Google Vision no está configurado en el servidor (falta GOOGLE_VISION_API_KEY).';
    if (st) { st.style.color = 'var(--danger)'; st.textContent = '✗ ' + msg; }
  }
}

// Parser InBody — mismo algoritmo que BIO360 (regex/heurísticas sobre el texto OCR),
// portado tal cual porque su valor está en los rangos/ventanas de búsqueda ya validados.
function m3ParseOcrText(text) {
  const result = {};

  function parseNum(s) {
    if (s == null) return undefined;
    const n = parseFloat(String(s).replace(',', '.'));
    return isNaN(n) ? undefined : n;
  }
  function firstDecimal(str, min, max) {
    const re = /([0-9]+[,.][0-9]+)/g; let m;
    while ((m = re.exec(str)) !== null) {
      const v = parseNum(m[1]);
      if (v != null && (min == null || v >= min) && (max == null || v <= max)) return v;
    }
    return undefined;
  }
  function winOf(src, re, before, after) {
    const norm = src.replace(/[áàâã]/gi,'a').replace(/[éèê]/gi,'e').replace(/[íì]/gi,'i').replace(/[óòô]/gi,'o').replace(/[úù]/gi,'u');
    const idx = norm.search(re);
    if (idx < 0) return '';
    const start = Math.max(0, idx - (before || 0));
    const end = Math.min(src.length, idx + (after || 200));
    return src.slice(start, end);
  }

  let v, m;

  // Versión InBody detectada en el encabezado
  (function() {
    const fechaIdx = text.search(/fecha[\s\/]*hora|date[\s\/]*time/i);
    const hdrZone = fechaIdx > 0 ? text.slice(0, fechaIdx) : text.slice(0, 600);
    const vM = hdrZone.match(/InBody\s*(\d[\w\-]*)/i);
    if (vM) { result._version = 'InBody' + vM[1]; }
    else { const vF = text.match(/InBody\s*(\d[\w\-]+)/i); result._version = vF ? ('InBody' + vF[1]) : null; }
  })();

  // Peso corporal — sección "Músculo-Grasa", último decimal antes de "MME"
  (function() {
    const mgRe = /m[uú]sculo[\s\-]+gras[ao]/i;
    let mgIdx = text.search(mgRe); if (mgIdx < 0) mgIdx = 0;
    const mmeIdx = text.slice(mgIdx).search(/\bmme\b/i);
    if (mmeIdx >= 0) {
      const zone = text.slice(mgIdx, mgIdx + mmeIdx);
      const decs = [];
      const dRe = /([0-9]+[,.][0-9]+)/g; let dm;
      while ((dm = dRe.exec(zone)) !== null) { const dv = parseNum(dm[1]); if (dv != null && dv >= 40 && dv <= 250) decs.push(dv); }
      if (decs.length > 0) { result.peso_total = decs[decs.length - 1]; return; }
    }
    const lines = text.split('\n');
    for (let li = 0; li < lines.length && result.peso_total == null; li++) {
      const ll = lines[li];
      if (/\bpeso\b/i.test(ll) && !/ideal|control|libre|magra/i.test(ll)) {
        const lw = ll + '\n' + (lines[li + 1] || '') + '\n' + (lines[li + 2] || '');
        v = firstDecimal(lw, 40, 250);
        if (v != null) result.peso_total = v;
      }
    }
    if (result.peso_total == null) {
      const pw = winOf(text, /\bpeso\b(?!\s*(?:ideal|control|libre|magra))/i, 0, 200);
      if (pw) { v = firstDecimal(pw, 40, 250); if (v != null) result.peso_total = v; }
    }
  })();

  // % Grasa corporal (PGC)
  (function() {
    let bmi = null;
    if (result.peso_total) {
      let htM = text.match(/\b(1[4-9][0-9]|2[0-2][0-9])\s*cm\b/i);
      if (!htM) htM = text.match(/altura\s+([0-9]{3})/i);
      if (htM) { const ht = parseInt(htM[1], 10); bmi = result.peso_total / Math.pow(ht / 100, 2); }
    }
    const pgcPos = []; const pgcRe = /\bpgc\b/gi; let pgcM;
    while ((pgcM = pgcRe.exec(text)) !== null) pgcPos.push(pgcM.index);
    const tries = pgcPos.length >= 2 ? [pgcPos[1], pgcPos[0]] : pgcPos.length >= 1 ? [pgcPos[0]] : [];
    for (let ti = 0; ti < tries.length && result.grasa_pct == null; ti++) {
      const pgcWin = text.slice(tries[ti], tries[ti] + 600);
      const pctOff = pgcWin.search(/\(%\)/);
      const searchFrom = pctOff >= 0 ? pgcWin.slice(pctOff + 3) : pgcWin;
      const sfLines = searchFrom.split('\n');
      for (let sfi = 0; sfi < sfLines.length && result.grasa_pct == null; sfi++) {
        const sfl = sfLines[sfi].trim();
        const sfDecs = sfl.match(/[0-9]+[,.][0-9]+/g);
        if (sfDecs && sfDecs.length === 1) {
          const sfV = parseNum(sfDecs[0]);
          if (sfV != null && sfV >= 10 && sfV <= 65) {
            if (Math.abs(sfV - Math.round(sfV)) < 0.01) continue;
            if (/[0-9]\s*(?:kg|%)/i.test(sfl)) continue;
            if (bmi && Math.abs(sfV - bmi) <= 0.8) continue;
            if (result.peso_total != null && Math.abs(sfV - result.peso_total) <= 2) continue;
            result.grasa_pct = sfV;
          }
        }
      }
    }
  })();

  // Peso ideal
  const ctrlSec = winOf(text, /control\s+de\s+peso/i, 0, 400);
  if (ctrlSec) {
    const idealSecM = ctrlSec.match(/peso\s+ideal[\s\S]{0,40}?([0-9]+[,.][0-9]+)/i);
    if (idealSecM) { v = parseNum(idealSecM[1]); if (v >= 30 && v <= 150) result.peso_objetivo = v; }
  }
  if (result.peso_objetivo == null) {
    const idealRe = /ideal/gi; let idealM;
    while ((idealM = idealRe.exec(text)) !== null) {
      const iWin = text.slice(idealM.index, idealM.index + 100);
      const iNumRe = /([0-9]+[,.][0-9]+)/g; let iDm;
      while ((iDm = iNumRe.exec(iWin)) !== null) {
        const iV = parseNum(iDm[1]);
        if (iV == null || iV < 40 || iV > 150) continue;
        if (result.peso_total != null && Math.abs(iV - result.peso_total) < 2) continue;
        result.peso_objetivo = iV; break;
      }
      if (result.peso_objetivo != null) break;
    }
  }

  // Grasa visceral
  const viscIdx = text.search(/visceral/i);
  if (viscIdx >= 0) {
    const viscSnip = text.slice(viscIdx + 8, viscIdx + 150);
    const viscClean = viscSnip.replace(/[0-9]+[,.][0-9]+/g, '');
    const viscIntM = viscClean.match(/\b([0-9]{1,2})\b/);
    if (viscIntM) { const vv = parseInt(viscIntM[1], 10); if (vv >= 1 && vv <= 20) result.grasa_visceral = vv; }
  }
  if (result.grasa_visceral == null) {
    m = text.match(/([0-9]{1,2})\s*\(?\s*1\s*[~\-]\s*9\s*\)?/);
    if (m) { const gvv = parseInt(m[1], 10); if (gvv >= 1 && gvv <= 20) result.grasa_visceral = gvv; }
  }

  // Metabolismo basal (BMR)
  m = text.match(/tasa\s+metab[^\n]{0,30}?([0-9]{3,4})\s*kcal/i);
  if (!m) m = text.match(/metab[a-záéíóú]{0,10}\s+basal[^0-9]{0,15}([0-9]{3,4})/i);
  if (!m) m = text.match(/([0-9]{4})\s*kcal/i);
  if (m) { v = parseInt(m[1], 10); if (v >= 600 && v <= 5000) result.bmr = v; }

  // Agua corporal total
  m = text.match(/agua\s+corporal\s+(?:total\s+)?\([Ll]\)[^0-9]{0,10}([0-9]+[,.][0-9]+)/i);
  if (!m) m = text.match(/agua\s+corporal\s+total[^0-9]{0,15}([0-9]+[,.][0-9]+)/i);
  if (!m) m = text.match(/agua\s+corporal[^0-9]{0,20}([0-9]+[,.][0-9]+)/i);
  if (m) { v = parseNum(m[1]); if (v >= 15 && v <= 80) result.ecw_tbw = Math.round(v * 10) / 10; }

  // Masa muscular esquelética (SMM/MME)
  const smmLines = text.split('\n');
  for (let si = 0; si < smmLines.length && result.smm == null; si++) {
    const sLine = smmLines[si];
    if (/m[uú]sculo\s+esqu/i.test(sLine) || /\bmme\s*\([Kk]g\)/i.test(sLine)) {
      const sWin = sLine + '\n' + (smmLines[si+1]||'') + '\n' + (smmLines[si+2]||'') + '\n' + (smmLines[si+3]||'');
      v = firstDecimal(sWin, 10, 60);
      if (v != null) result.smm = v;
    }
  }
  if (result.smm == null) {
    const sWinG = winOf(text, /masa\s+de\s+m[uú]sculo/i, 0, 150);
    if (sWinG) { v = firstDecimal(sWinG, 10, 60); if (v != null) result.smm = v; }
  }

  // Masa ósea (minerales)
  (function() {
    const secIdx = text.search(/[aá]n[aá]lisis\s+de\s+composici[oó]n\s+corporal/i);
    const src = secIdx >= 0 ? text.slice(secIdx, secIdx + 800) : text;
    const mm = src.match(/minerales\s*\(kg\)\s*([0-9]+[,.][0-9]+)/i);
    if (mm) { const vv = parseNum(mm[1]); if (vv >= 1.5 && vv <= 5.5) { result.masa_osea = vv; return; } }
    const lns = src.split('\n');
    for (let li = 0; li < lns.length; li++) {
      if (!/mineral/i.test(lns[li])) continue;
      if (/prote[ií]/i.test(lns[li])) continue;
      const nums = lns[li].match(/([0-9]+[,.][0-9]+)/g) || [];
      for (let ni = 0; ni < nums.length; ni++) { const vv2 = parseNum(nums[ni]); if (vv2 >= 1.5 && vv2 <= 5.5) { result.masa_osea = vv2; return; } }
      if (li + 1 < lns.length) {
        const next = lns[li + 1].match(/([0-9]+[,.][0-9]+)/g) || [];
        for (let ni2 = 0; ni2 < next.length; ni2++) { const vv3 = parseNum(next[ni2]); if (vv3 >= 1.5 && vv3 <= 5.5) { result.masa_osea = vv3; return; } }
      }
    }
  })();

  // Altura
  m = text.match(/altura\s+([0-9]{3})\s*cm/i);
  if (!m) m = text.match(/\b(1[4-9][0-9]|2[0-2][0-9])\s*cm\b/i);
  if (m) result.height = parseInt(m[1], 10);

  // Ángulo de fase
  const afIdx = text.search(/[aá]ngulo\s+de\s+fase/i);
  if (afIdx >= 0) {
    const afWin = text.slice(afIdx, afIdx + 120);
    const afM = afWin.match(/([0-9]+[,.][0-9]+)/);
    if (afM) { v = parseNum(afM[1]); if (v >= 1 && v <= 15) result.angulo_fase = v; }
  }

  // Validación cruzada: SMM no puede superar la masa magra calculada
  if (result.peso_total != null && result.grasa_pct != null && result.smm != null) {
    const masaMagra = result.peso_total * (1 - result.grasa_pct / 100);
    if (result.smm > masaMagra * 1.05) result.smm = null;
  }

  return result;
}

function printAsPdf(title, bodyHtml) {
  const w = window.open('', '_blank');
  if (!w) { alert('Habilita las ventanas emergentes para descargar el PDF.'); return; }
  w.document.write(`<html><head><title>${title}</title><style>body{font-family:sans-serif;padding:24px;color:#222}h1{font-size:20px}table{width:100%;border-collapse:collapse;margin-top:12px}td,th{padding:8px;border:1px solid #ccc;text-align:left}</style></head><body><h1>${title}</h1>${bodyHtml}</body></html>`);
  w.document.close();
  w.focus();
  w.print();
}

async function activateClient(id) {

  if (!clientType) return alert('Elige el tipo de cliente antes de activar (Coaching 1:1, Coaching Online o Leads Wellness).');
  try {
    await api(`/api/clients/${id}/client-type`, { method: 'PATCH', body: JSON.stringify({ client_type: clientType }) });

  } catch (e) { alert('Error: ' + e.message); }

  catch (e) { alert('Error: ' + e.message); }

function isClientPlanExpired(client) {
  if (!client || !client.plan_end_date) return false;
  return new Date().toISOString().slice(0, 10) > client.plan_end_date;
}
function applyUpdatedClient(client) {
  const idx = (state.clients || []).findIndex(c => c.id === client.id);
  if (idx !== -1) state.clients[idx] = client;
}
async function renewClientPlan(id) {
  const duration = parseInt(document.getElementById('cd-plan-duration').value, 10);

      <div class="page-header"><h2>Notificaciones</h2><p>Eventos recientes de tus clientes.</p></div>
      <div class="card">
        ${notifications.length ? notifications.map(n => `
          <div class="list-row" style="${n.read ? 'opacity:.6;' : ''}">
            <div>
              <strong>${n.message}</strong>
              <div style="font-size:12px;color:var(--ink-soft);">${new Date(n.created_at).toLocaleString()}</div>
            </div>
            <div style="display:flex;gap:8px;">
              <button class="small-btn" onclick="openClient('${n.client_id}')">Ver cliente</button>
              ${!n.read ? `<button class="small-btn" onclick="markNotificationRead('${n.id}')">Marcar leída</button>` : ''}
            </div>
          </div>
        `).join('') : '<div class="empty-state">No hay notificaciones por ahora.</div>'}
      </div>
    `;
  } catch (e) { el.innerHTML = `<div class="error-msg">${e.message}</div>`; }
}
async function markNotificationRead(id) {
  try {
    await api(`/api/admin/notifications/${id}/read`, { method: 'PATCH' });
    const n = (state.notifications || []).find(x => x.id === id);
    if (n) n.read = true;
    renderNav();
    renderMain();
  } catch (e) { alert('Error: ' + e.message); }
}

async function renderAdminCommunity(el) {
  try {
    const [{ events }, { therapies }] = await Promise.all([api('/api/community/events'), api('/api/community/therapies')]);
    el.innerHTML = `
      <div class="page-header"><h2>Comunidad — Administración</h2><p>Publica eventos y terapias disponibles.</p></div>
      <div class="card">
        <div class="card-title">Nuevo evento</div>
        <div class="grid-3">
          <div class="field"><label>Título</label><input id="ev-new-title"></div>
          <div class="field"><label>Fecha</label><input type="datetime-local" id="ev-new-date"></div>
          <div class="field"><label>Lugar</label><input id="ev-new-location"></div>
        </div>
        <div class="field"><label>Descripción</label><textarea id="ev-new-desc" rows="2"></textarea></div>
        <button class="btn btn-primary" style="width:auto" onclick="createEvent()">Publicar evento</button>
      </div>
      <div class="card">
        <div class="card-title">Eventos publicados</div>
        ${events.map(e => `<div class="list-row"><div>${e.title}</div><button class="small-btn" onclick="deleteEvent('${e.id}')">Eliminar</button></div>`).join('') || '<div class="empty-state">Sin eventos.</div>'}
      </div>
      <div class="card">
        <div class="card-title">Nueva terapia</div>
        <div class="grid-3">
          <div class="field"><label>Título</label><input id="th-new-title"></div>
          <div class="field"><label>Proveedor</label><input id="th-new-provider"></div>
          <div class="field"><label>Descuento (%)</label><input type="number" id="th-new-discount"></div>
        </div>
        <div class="field"><label>Descripción</label><textarea id="th-new-desc" rows="2"></textarea></div>
        <button class="btn btn-primary" style="width:auto" onclick="createTherapy()">Publicar terapia</button>
      </div>
      <div class="card">
        <div class="card-title">Terapias publicadas</div>
        ${therapies.map(t => `<div class="list-row"><div>${t.title}</div><button class="small-btn" onclick="deleteTherapy('${t.id}')">Eliminar</button></div>`).join('') || '<div class="empty-state">Sin terapias.</div>'}
      </div>
    `;
  } catch (e) { el.innerHTML = `<div class="error-msg">${e.message}</div>`; }
}
async function createEvent() {
  const payload = {
    title: document.getElementById('ev-new-title').value,
    event_date: document.getElementById('ev-new-date').value || null,
    location: document.getElementById('ev-new-location').value,
    description: document.getElementById('ev-new-desc').value,
  };
  try { await api('/api/community/events', { method: 'POST', body: JSON.stringify(payload) }); renderMain(); }
  catch (e) { alert('Error: ' + e.message); }
}
async function deleteEvent(id) {
  try { await api(`/api/community/events/${id}`, { method: 'DELETE' }); renderMain(); }
  catch (e) { alert('Error: ' + e.message); }
}
async function createTherapy() {
  const payload = {
    title: document.getElementById('th-new-title').value,
    provider: document.getElementById('th-new-provider').value,
    discount_pct: document.getElementById('th-new-discount').value || 0,
    description: document.getElementById('th-new-desc').value,
  };
  try { await api('/api/community/therapies', { method: 'POST', body: JSON.stringify(payload) }); renderMain(); }
  catch (e) { alert('Error: ' + e.message); }
}
async function deleteTherapy(id) {
  try { await api(`/api/community/therapies/${id}`, { method: 'DELETE' }); renderMain(); }
  catch (e) { alert('Error: ' + e.message); }
}

boot();
</script>
</body>
</html>
