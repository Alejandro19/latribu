async function commitModule3Draft(clientId) {
  const draft = window._m3Draft;
  if (!draft || window._m3DraftClientId !== clientId) return;
  const monthNum = window._m3NextMonthNum || 1;

  const { cintura, brazos, hombros, piernas, gluteo } = draft.am;
  if (cintura || brazos || hombros || piernas || gluteo) {
    await api(`/api/clients/${clientId}/anthropometrics`, { method: 'POST', body: JSON.stringify({
      fecha: new Date().toISOString().slice(0, 10), peso: draft.weight || null,
      cintura: cintura || null, brazos: brazos || null, hombros: hombros || null, piernas: piernas || null, gluteo: gluteo || null,
      mes_num: monthNum
    })});
  }

  for (const a of PHOTO_ANGLES) {
    const file = draft.photos[a.key];
    if (!file) continue;
    const fd = new FormData();
    fd.append('photo', file);
    fd.append('angle', a.key);
    fd.append('mes_num', monthNum);
    await api(`/api/clients/${clientId}/photos`, { method: 'POST', body: fd });
  }

  if (draft.inbody.ocrDone && draft.inbody.pesoTotal) {
    await api(`/api/clients/${clientId}/inbody-records`, { method: 'POST', body: JSON.stringify({
      fecha: new Date().toISOString().slice(0, 10),
      version: draft.inbody.version,
      peso_total: draft.inbody.pesoTotal || null,
      smm: draft.inbody.smm || null,
      grasa_pct: draft.inbody.grasaPct || null,
      imc: draft.inbody.imc || null,
      peso_objetivo: draft.inbody.pesoObjetivo || null,
      grasa_visceral: draft.inbody.grasaVisceral || null,
      bmr: draft.inbody.bmr || null,
      angulo_fase: draft.inbody.anguloFase || null,
      ecw_tbw: draft.inbody.ecwTbw || null,
      masa_osea: draft.inbody.masaOsea || null,
      altura: draft.inbody.altura || null,
      mes_num: monthNum,
      file_url: draft.inbody.fileUrl || null,
      file_name: draft.inbody.fileName || null
    })});
  }

  window._m3InbodyFileUrl = null;
  window._m3InbodyFileName = null;
  window._m3NextMonthNum = monthNum + 1;
  window._m3Draft = null;
  window._m3DraftClientId = null;
}

// Obligatorios en Composición Corporal — se excluyen a propósito "Ángulo de
// fase" (m3-angulo-fase) y toda la sección "Medidas antropométricas" (am-*),
// que quedan opcionales por decisión explícita.
const MODULE3_REQUIRED_FIELDS = [
  'field-weight', 'field-height', 'field-body_fat',
  'm3-peso-total', 'm3-smm', 'm3-grasa-pct', 'm3-peso-objetivo',
  'm3-grasa-visceral', 'm3-bmr', 'm3-ecw-tbw', 'm3-masa-osea', 'm3-height',
];
function validateModule3() {
  let valid = true;
  MODULE3_REQUIRED_FIELDS.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    const wrapper = el.closest('.field');
    const isEmpty = String(el.value || '').trim() === '';
    if (isEmpty) {
      valid = false;
      if (wrapper) wrapper.classList.add('invalid');
      const accContent = el.closest('.accordion-content');
      if (accContent) accContent.classList.add('active');
    } else if (wrapper) {
      wrapper.classList.remove('invalid');
    }
  });
  return valid;
}
function saveModule3() {
  if (window._m3UploadInProgress) {
    alert('Espera a que termine de subirse el archivo InBody antes de continuar.');
    return;
  }
  if (!validateModule3()) return;
  // Nada se guarda en el servidor aquí — solo queda como borrador en memoria hasta
  // que se haga clic en "Finalizar" (ver saveOnboardingStep / commitModule3Draft).
  captureModule3Draft();
  window._m3DraftClientId = currentClientId();
  setStep(4);
}

function m3UpdateIMC() {
  const w = parseFloat(document.getElementById('m3-peso-total').value || 0);
  const h = parseFloat(document.getElementById('m3-height').value || 0);
  const el = document.getElementById('m3-imc-display');
  if (!el) return;
  el.value = (w > 0 && h > 0) ? (w / Math.pow(h / 100, 2)).toFixed(1) : '';
}

async function m3HandlePdf(input) {
  const file = input.files[0]; if (!file) return;
  const st = document.getElementById('m3-ocr-status');
  const clientId = currentClientId();

  if (file.size > 25 * 1024 * 1024) {
    if (st) { st.style.color = 'var(--danger)'; st.textContent = '✗ El archivo excede 25 MB.'; }
    return;
  }
  if (st) { st.style.color = 'var(--sage)'; st.textContent = 'Procesando archivo…'; }
  window._m3UploadInProgress = true;

  try {
    const base64 = await new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = (e) => {
        const s = e.target.result;
        const raw = s.includes(',') ? s.split(',')[1] : s;
        if (file.type && file.type.startsWith('image/')) {
          const img = new Image();
          img.onload = () => {
            const MAX = 1600;
            let w = img.width, h = img.height;
            if (w > MAX || h > MAX) { if (w > h) { h = Math.round(h * MAX / w); w = MAX; } else { w = Math.round(w * MAX / h); h = MAX; } }
            const cv = document.createElement('canvas'); cv.width = w; cv.height = h;
            cv.getContext('2d').drawImage(img, 0, 0, w, h);
            try { resolve(cv.toDataURL('image/jpeg', 0.85).split(',')[1]); } catch (ex) { resolve(raw); }
          };
          img.onerror = () => resolve(raw);
          img.src = s;
        } else {
          resolve(raw);
        }
      };
      r.onerror = reject;
      r.readAsDataURL(file);
    });

    if (st) st.textContent = 'Enviando a análisis…';
    const result = await api(`/api/clients/${clientId}/ocr-vision`, { method: 'POST', body: JSON.stringify({ base64 }) });
    const text = result.text || '';
    if (!text.trim()) throw new Error('No se pudo extraer texto. Exporta el reporte como JPG/PNG e intenta de nuevo.');

    const parsed = m3ParseOcrText(text);
    const count = Object.keys(parsed).filter(k => k.charAt(0) !== '_').length;
    if (count === 0) throw new Error('No se detectaron campos. Intenta con una captura JPG/PNG del reporte InBody.');

    const FIELD_MAP = {
      peso_total: 'm3-peso-total', smm: 'm3-smm', grasa_pct: 'm3-grasa-pct',
      peso_objetivo: 'm3-peso-objetivo', grasa_visceral: 'm3-grasa-visceral',
      bmr: 'm3-bmr', angulo_fase: 'm3-angulo-fase', ecw_tbw: 'm3-ecw-tbw',
      masa_osea: 'm3-masa-osea', height: 'm3-height'
    };
    Object.values(FIELD_MAP).forEach(elId => { const el = document.getElementById(elId); if (el) el.value = ''; });
    Object.keys(parsed).forEach(k => {
      const elId = FIELD_MAP[k]; if (!elId) return;
      const el = document.getElementById(elId); if (!el) return;
      el.value = parsed[k];
    });
    m3UpdateIMC();
    window._m3OcrDone = true;
    window._m3InbodyVersion = parsed._version || null;
    const verLbl = document.getElementById('m3-version-label');
    if (parsed._version && verLbl) { verLbl.textContent = 'Detectado: ' + parsed._version; verLbl.style.display = 'block'; }

    let fileAttached = false;
    try {
      const fd = new FormData();
      fd.append('file', file);
      const uploadResult = await api(`/api/clients/${clientId}/inbody-upload`, { method: 'POST', body: fd });
      window._m3InbodyFileUrl = uploadResult.file_url;
      window._m3InbodyFileName = uploadResult.file_name;
      fileAttached = true;
    } catch (e) { console.error('inbody-upload falló:', e); /* se conservan los valores extraídos por OCR aunque no se pudo adjuntar el archivo original */ }

    if (st) {
      st.style.color = fileAttached ? 'var(--sage)' : 'var(--danger)';
      st.textContent = fileAttached
        ? '✓ ' + count + ' campos detectados y rellenados. Archivo adjuntado.'
        : '⚠ ' + count + ' campos detectados y rellenados, pero el archivo original NO se pudo adjuntar — inténtalo de nuevo antes de continuar.';
    }
  } catch (e) {
    let msg = e.message || 'Error al procesar el archivo.';
    if (msg.toLowerCase().includes('forbidden') || msg.toLowerCase().includes('cloud vision api no habilitada')) msg = 'Cloud Vision API no habilitada en Google Cloud Console.';
    else if (msg.toLowerCase().includes('no está configurada')) msg = 'Google Vision no está configurado en el servidor (falta GOOGLE_VISION_API_KEY).';
    if (st) { st.style.color = 'var(--danger)'; st.textContent = '✗ ' + msg; }
  } finally {
    window._m3UploadInProgress = false;
  }
}

// Parser InBody — mismo algoritmo que BIO360 (regex/heurísticas sobre el texto OCR),
// portado tal cual porque su valor está en los rangos/ventanas de búsqueda ya validados.
function m3ParseOcrText(text) {
  const result = {};

  function parseNum(s) {
    if (s == null) return undefined;
    const n = parseFloat(String(s).replace(',', '.'));
    return isNaN(n) ? undefined : n;
  }
  function firstDecimal(str, min, max) {
    const re = /([0-9]+[,.][0-9]+)/g; let m;
    while ((m = re.exec(str)) !== null) {
      const v = parseNum(m[1]);
      if (v != null && (min == null || v >= min) && (max == null || v <= max)) return v;
    }
    return undefined;
  }
  function winOf(src, re, before, after) {
    const norm = src.replace(/[áàâã]/gi,'a').replace(/[éèê]/gi,'e').replace(/[íì]/gi,'i').replace(/[óòô]/gi,'o').replace(/[úù]/gi,'u');
    const idx = norm.search(re);
    if (idx < 0) return '';
    const start = Math.max(0, idx - (before || 0));
    const end = Math.min(src.length, idx + (after || 200));
    return src.slice(start, end);
  }

  let v, m;

  // Versión InBody detectada en el encabezado
  (function() {
    const fechaIdx = text.search(/fecha[\s\/]*hora|date[\s\/]*time/i);
    const hdrZone = fechaIdx > 0 ? text.slice(0, fechaIdx) : text.slice(0, 600);
    const vM = hdrZone.match(/InBody\s*(\d[\w\-]*)/i);
    if (vM) { result._version = 'InBody' + vM[1]; }
    else { const vF = text.match(/InBody\s*(\d[\w\-]+)/i); result._version = vF ? ('InBody' + vF[1]) : null; }
  })();

  // Peso corporal — sección "Músculo-Grasa", último decimal antes de "MME"
  (function() {
    const mgRe = /m[uú]sculo[\s\-]+gras[ao]/i;
    let mgIdx = text.search(mgRe); if (mgIdx < 0) mgIdx = 0;
    const mmeIdx = text.slice(mgIdx).search(/\bmme\b/i);
    if (mmeIdx >= 0) {
      const zone = text.slice(mgIdx, mgIdx + mmeIdx);
      const decs = [];
      const dRe = /([0-9]+[,.][0-9]+)/g; let dm;
      while ((dm = dRe.exec(zone)) !== null) { const dv = parseNum(dm[1]); if (dv != null && dv >= 40 && dv <= 250) decs.push(dv); }
      if (decs.length > 0) { result.peso_total = decs[decs.length - 1]; return; }
    }
    const lines = text.split('\n');
    for (let li = 0; li < lines.length && result.peso_total == null; li++) {
      const ll = lines[li];
      if (/\bpeso\b/i.test(ll) && !/ideal|control|libre|magra/i.test(ll)) {
        const lw = ll + '\n' + (lines[li + 1] || '') + '\n' + (lines[li + 2] || '');
        v = firstDecimal(lw, 40, 250);
        if (v != null) result.peso_total = v;
      }
    }
    if (result.peso_total == null) {
      const pw = winOf(text, /\bpeso\b(?!\s*(?:ideal|control|libre|magra))/i, 0, 200);
      if (pw) { v = firstDecimal(pw, 40, 250); if (v != null) result.peso_total = v; }
    }
  })();

  // % Grasa corporal (PGC)
  (function() {
    let bmi = null;
    if (result.peso_total) {
      let htM = text.match(/\b(1[4-9][0-9]|2[0-2][0-9])\s*cm\b/i);
      if (!htM) htM = text.match(/altura\s+([0-9]{3})/i);
      if (htM) { const ht = parseInt(htM[1], 10); bmi = result.peso_total / Math.pow(ht / 100, 2); }
    }
    const pgcPos = []; const pgcRe = /\bpgc\b/gi; let pgcM;
    while ((pgcM = pgcRe.exec(text)) !== null) pgcPos.push(pgcM.index);
    const tries = pgcPos.length >= 2 ? [pgcPos[1], pgcPos[0]] : pgcPos.length >= 1 ? [pgcPos[0]] : [];
    for (let ti = 0; ti < tries.length && result.grasa_pct == null; ti++) {
      const pgcWin = text.slice(tries[ti], tries[ti] + 600);
      const pctOff = pgcWin.search(/\(%\)/);
      const searchFrom = pctOff >= 0 ? pgcWin.slice(pctOff + 3) : pgcWin;
      const sfLines = searchFrom.split('\n');
      for (let sfi = 0; sfi < sfLines.length && result.grasa_pct == null; sfi++) {
        const sfl = sfLines[sfi].trim();
        const sfDecs = sfl.match(/[0-9]+[,.][0-9]+/g);
        if (sfDecs && sfDecs.length === 1) {
          const sfV = parseNum(sfDecs[0]);
          if (sfV != null && sfV >= 10 && sfV <= 65) {
            if (Math.abs(sfV - Math.round(sfV)) < 0.01) continue;
            if (/[0-9]\s*(?:kg|%)/i.test(sfl)) continue;
            if (bmi && Math.abs(sfV - bmi) <= 0.8) continue;
            if (result.peso_total != null && Math.abs(sfV - result.peso_total) <= 2) continue;
            result.grasa_pct = sfV;
          }
        }
      }
    }
  })();

  // Peso ideal
  const ctrlSec = winOf(text, /control\s+de\s+peso/i, 0, 400);
  if (ctrlSec) {
    const idealSecM = ctrlSec.match(/peso\s+ideal[\s\S]{0,40}?([0-9]+[,.][0-9]+)/i);
    if (idealSecM) { v = parseNum(idealSecM[1]); if (v >= 30 && v <= 150) result.peso_objetivo = v; }
  }
  if (result.peso_objetivo == null) {
    const idealRe = /ideal/gi; let idealM;
    while ((idealM = idealRe.exec(text)) !== null) {
      const iWin = text.slice(idealM.index, idealM.index + 100);
      const iNumRe = /([0-9]+[,.][0-9]+)/g; let iDm;
      while ((iDm = iNumRe.exec(iWin)) !== null) {
        const iV = parseNum(iDm[1]);
        if (iV == null || iV < 40 || iV > 150) continue;
        if (result.peso_total != null && Math.abs(iV - result.peso_total) < 2) continue;
        result.peso_objetivo = iV; break;
      }
      if (result.peso_objetivo != null) break;
    }
  }

  // Grasa visceral
  const viscIdx = text.search(/visceral/i);
  if (viscIdx >= 0) {
    const viscSnip = text.slice(viscIdx + 8, viscIdx + 150);
    const viscClean = viscSnip.replace(/[0-9]+[,.][0-9]+/g, '');
    const viscIntM = viscClean.match(/\b([0-9]{1,2})\b/);
    if (viscIntM) { const vv = parseInt(viscIntM[1], 10); if (vv >= 1 && vv <= 20) result.grasa_visceral = vv; }
  }
  if (result.grasa_visceral == null) {
    m = text.match(/([0-9]{1,2})\s*\(?\s*1\s*[~\-]\s*9\s*\)?/);
    if (m) { const gvv = parseInt(m[1], 10); if (gvv >= 1 && gvv <= 20) result.grasa_visceral = gvv; }
  }

  // Metabolismo basal (BMR)
  m = text.match(/tasa\s+metab[^\n]{0,30}?([0-9]{3,4})\s*kcal/i);
  if (!m) m = text.match(/metab[a-záéíóú]{0,10}\s+basal[^0-9]{0,15}([0-9]{3,4})/i);
  if (!m) m = text.match(/([0-9]{4})\s*kcal/i);
  if (m) { v = parseInt(m[1], 10); if (v >= 600 && v <= 5000) result.bmr = v; }

  // Agua corporal total
  m = text.match(/agua\s+corporal\s+(?:total\s+)?\([Ll]\)[^0-9]{0,10}([0-9]+[,.][0-9]+)/i);
  if (!m) m = text.match(/agua\s+corporal\s+total[^0-9]{0,15}([0-9]+[,.][0-9]+)/i);
  if (!m) m = text.match(/agua\s+corporal[^0-9]{0,20}([0-9]+[,.][0-9]+)/i);
  if (m) { v = parseNum(m[1]); if (v >= 15 && v <= 80) result.ecw_tbw = Math.round(v * 10) / 10; }

  // Masa muscular esquelética (SMM/MME)
  const smmLines = text.split('\n');
  for (let si = 0; si < smmLines.length && result.smm == null; si++) {
    const sLine = smmLines[si];
    if (/m[uú]sculo\s+esqu/i.test(sLine) || /\bmme\s*\([Kk]g\)/i.test(sLine)) {
      const sWin = sLine + '\n' + (smmLines[si+1]||'') + '\n' + (smmLines[si+2]||'') + '\n' + (smmLines[si+3]||'');
      v = firstDecimal(sWin, 10, 60);
      if (v != null) result.smm = v;
    }
  }
  if (result.smm == null) {
    const sWinG = winOf(text, /masa\s+de\s+m[uú]sculo/i, 0, 150);
    if (sWinG) { v = firstDecimal(sWinG, 10, 60); if (v != null) result.smm = v; }
  }

  // Masa ósea (minerales)
  (function() {
    const secIdx = text.search(/[aá]n[aá]lisis\s+de\s+composici[oó]n\s+corporal/i);
    const src = secIdx >= 0 ? text.slice(secIdx, secIdx + 800) : text;
    const mm = src.match(/minerales\s*\(kg\)\s*([0-9]+[,.][0-9]+)/i);
    if (mm) { const vv = parseNum(mm[1]); if (vv >= 1.5 && vv <= 5.5) { result.masa_osea = vv; return; } }
    const lns = src.split('\n');
    for (let li = 0; li < lns.length; li++) {
      if (!/mineral/i.test(lns[li])) continue;
      if (/prote[ií]/i.test(lns[li])) continue;
      const nums = lns[li].match(/([0-9]+[,.][0-9]+)/g) || [];
      for (let ni = 0; ni < nums.length; ni++) { const vv2 = parseNum(nums[ni]); if (vv2 >= 1.5 && vv2 <= 5.5) { result.masa_osea = vv2; return; } }
      if (li + 1 < lns.length) {
        const next = lns[li + 1].match(/([0-9]+[,.][0-9]+)/g) || [];
        for (let ni2 = 0; ni2 < next.length; ni2++) { const vv3 = parseNum(next[ni2]); if (vv3 >= 1.5 && vv3 <= 5.5) { result.masa_osea = vv3; return; } }
      }
    }
  })();

  // Altura
  m = text.match(/altura\s+([0-9]{3})\s*cm/i);
  if (!m) m = text.match(/\b(1[4-9][0-9]|2[0-2][0-9])\s*cm\b/i);
  if (m) result.height = parseInt(m[1], 10);

  // Ángulo de fase
  const afIdx = text.search(/[aá]ngulo\s+de\s+fase/i);
  if (afIdx >= 0) {
    const afWin = text.slice(afIdx, afIdx + 120);
    const afM = afWin.match(/([0-9]+[,.][0-9]+)/);
    if (afM) { v = parseNum(afM[1]); if (v >= 1 && v <= 15) result.angulo_fase = v; }
  }

  // Validación cruzada: SMM no puede superar la masa magra calculada
  if (result.peso_total != null && result.grasa_pct != null && result.smm != null) {
    const masaMagra = result.peso_total * (1 - result.grasa_pct / 100);
    if (result.smm > masaMagra * 1.05) result.smm = null;
  }

  return result;
}

// ---------------- Módulo: Entrenamiento ----------------

const CATEGORY_LABELS = { warmup: 'Warm Up', strength: 'Strength', cardio: 'Cardio' };
// Estado de navegación del módulo Entrenamiento (día → categoría → ejercicio en curso).
// Vive solo en memoria: se reinicia al recargar la app, igual que el resto de borradores
// de sesión de este módulo.
let trainingUI = { day: null, category: null, index: 0, completed: {}, lastCategory: null, editingExerciseId: null, openDayAccordion: null };

function youtubeEmbedUrl(url) {
  if (!url) return null;
  const m = String(url).match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([a-zA-Z0-9_-]{6,})/);
  return m ? `https://www.youtube.com/embed/${m[1]}` : null;
}
function parseTimeToSeconds(value) {
  const str = String(value || '').trim();
  const mmss = str.match(/^(\d+):(\d{2})$/);
  if (mmss) return parseInt(mmss[1], 10) * 60 + parseInt(mmss[2], 10);
  const num = parseInt(str.replace(/\D/g, ''), 10);
  return isNaN(num) || num <= 0 ? 30 : num;
}
function formatSeconds(s) {
  const m = Math.floor(s / 60), sec = s % 60;
  return `${m}:${String(sec).padStart(2, '0')}`;
}

function renderTrainingLocked(el) {
  el.innerHTML = `
    ${renderIdentityHeader('Entrenamiento', 'Tu programa de ejercicios personalizado.', '')}
    ${renderLockedOverlay(`
      <div class="card">
        <div class="card-title">Días de entrenamiento</div>

        </div>
      </div>
    `, {

      ctaAction: 'openWhatsappCta()',
    })}
  `;
}

async function renderTraining(el) {
  const isAdmin = state.role === 'admin';
  if (!isAdmin && state.clientType === 'lead_wellness') return renderTrainingLocked(el);
  const clientId = currentClientId();
  try {
    if (isAdmin && !clientId) {
      await ensureClientsLoaded();
      const adminQuotes = (await api('/api/admin/quotes').catch(() => ({ quotes: [] }))).quotes || [];
      window._trainingExercises = [];
      window._trainingClientDays = 0;
      return renderTrainingHome(el, [], { training_days: null, assigned_quote_id: null }, true, null, adminQuotes, []);
    }
    const calls = [
      api(`/api/clients/${clientId}/exercises`),
      api(`/api/clients/${clientId}`),
      api(`/api/clients/${clientId}/quote-of-the-day`).catch(() => ({ quote: null })),
      api(`/api/clients/${clientId}/training-completions`).catch(() => ({ completions: [] })),
    ];
    if (isAdmin) calls.push(api('/api/admin/quotes').catch(() => ({ quotes: [] })));
    if (isAdmin) await ensureClientsLoaded();
    const [{ exercises }, { client }, { quote }, { completions }, quotesResult] = await Promise.all(calls);
    window._trainingExercises = exercises;
    window._trainingCompletions = completions;
    const adminQuotes = quotesResult ? quotesResult.quotes : [];

    if (trainingUI.day && trainingUI.category) return renderTrainingPlayer(el, exercises, client, isAdmin);
    if (trainingUI.day) return renderTrainingDay(el, exercises, client, isAdmin, completions);
    return renderTrainingHome(el, exercises, client, isAdmin, quote, adminQuotes, completions);
  } catch (e) { el.innerHTML = `<div class="error-msg">${e.message}</div>`; }
}

// Semana calendario lunes→domingo: el candado de "Día N" se reinicia cada lunes.
function getWeekStart(date = new Date()) {
  const d = new Date(date);
  const day = d.getDay();
  d.setDate(d.getDate() + ((day === 0 ? -6 : 1) - day));
  d.setHours(0, 0, 0, 0);
  return d.toISOString().slice(0, 10);
}
function isDayCompletedThisWeek(dayNumber, completions) {
  const weekStart = getWeekStart();
  return completions.some(c => c.day_number === dayNumber && c.completed_date >= weekStart);
}
function isDayUnlocked(dayNumber, completions) {
  return dayNumber === 1 || isDayCompletedThisWeek(dayNumber - 1, completions);
}
function renderProgressBar(done, total) {
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  const barWidth = Math.min(pct, 100);
  return `<div style="margin-top:14px;">
    <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--ink-soft);margin-bottom:4px;"><span>Progreso</span><span>${done}/${total} · ${pct}%</span></div>
    <div style="height:8px;background:var(--line);border-radius:999px;overflow:hidden;"><div style="height:100%;width:${barWidth}%;background:var(--terracota);border-radius:999px;"></div></div>
  </div>`;
}
// Anillo de progreso pequeño reusable — mismo patrón que el anillo de "Nivel de disciplina".
function renderMiniRing(pct, size) {
  size = size || 46;
  const r = (size - 8) / 2;
  const circ = 2 * Math.PI * r;
  const filled = Math.max(0, Math.min(100, pct)) / 100 * circ;
  return `<div class="mini-ring" style="width:${size}px;height:${size}px;">
    <svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}">
      <circle cx="${size / 2}" cy="${size / 2}" r="${r}" fill="none" stroke="#E7DFC9" stroke-width="4"></circle>
      <circle cx="${size / 2}" cy="${size / 2}" r="${r}" fill="none" stroke="#B8935A" stroke-width="4" stroke-linecap="round" stroke-dasharray="${filled.toFixed(1)} ${circ.toFixed(1)}"></circle>
    </svg>
  </div>`;
}
const CATEGORY_ICONS = {
  warmup: '<circle cx="15" cy="15" r="6" stroke="currentColor" stroke-width="1.8" fill="none"/><path d="M15 2v4M15 24v4M2 15h4M24 15h4M6.5 6.5l2.8 2.8M20.7 20.7l2.8 2.8M23.5 6.5l-2.8 2.8M9.3 20.7l-2.8 2.8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>',
  strength: '<rect x="2" y="11" width="5" height="8" rx="1.5" stroke="currentColor" stroke-width="1.8" fill="none"/><rect x="23" y="11" width="5" height="8" rx="1.5" stroke="currentColor" stroke-width="1.8" fill="none"/><path d="M7 15h16" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>',
  cardio: '<path d="M3 15h5l2-7 3 13 2-10 2 4h7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>',
};
function categoryIcon(cat) {
  return `<svg class="category-icon" width="30" height="30" viewBox="0 0 30 30" fill="none">${CATEGORY_ICONS[cat] || ''}</svg>`;
}
// El nivel de disciplina se mide contra los días de entrenamiento semanales que
// el admin le asignó al cliente, proyectados a un mes estándar de 4 semanas
// (ej. 3 días/semana → meta de 12 entrenamientos al mes), no contra el total
// de días del mes calendario.
function calculateDisciplineStats(completions, trainingDays) {
  const now = new Date();
  const monthPrefix = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-`;
  const doneDays = new Set(completions.filter(c => c.completed_date.startsWith(monthPrefix)).map(c => c.completed_date)).size;
  const expected = (trainingDays || 0) * 4;
  const pct = expected > 0 ? Math.round((doneDays / expected) * 100) : 0;
  return { doneDays, expected, pct };
}
function renderDisciplineCalendar(completions, stats) {
  const now = new Date();
  const year = now.getFullYear(), month = now.getMonth();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const completedDates = new Set(completions.map(c => c.completed_date));
  const todayStr = now.toISOString().slice(0, 10);
  const cells = [];
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    const done = completedDates.has(dateStr);
    const isToday = dateStr === todayStr;
    cells.push(`<div class="cal-day ${done ? 'done' : ''} ${isToday ? 'today' : ''}"><span class="cal-num">${d}</span>${done ? '<span class="cal-mark">✓</span>' : ''}</div>`);
  }
  return `${renderProgressBar(stats.doneDays, stats.expected)}<div class="cal-grid" style="margin-top:14px;">${cells.join('')}</div>`;
}

function getCurrentPlanWeekAndDay(client, completions) {
  const trainingDays = client.training_days || 0;
  if (!trainingDays) return null;
  const anchor = client.plan_start_date || (client.created_at || '').slice(0, 10);
  if (!anchor) return null;
  const anchorDate = new Date(anchor + 'T00:00:00');
  if (isNaN(anchorDate.getTime())) return null;
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const diffDays = Math.floor((today - anchorDate) / 86400000);
  const week = Math.max(1, Math.floor(diffDays / 7) + 1);
  const doneThisWeek = new Set(completions.filter(c => c.completed_date >= getWeekStart()).map(c => c.day_number)).size;
  const day = Math.min(trainingDays, doneThisWeek + 1);
  return { week, day };
}

      </div>` : ex.video_url ? `<video src="${ex.video_url}" controls ${isAdmin ? '' : 'controlsList="nodownload" oncontextmenu="return false;"'} style="width:100%;border-radius:14px;background:#000;"></video>` : '<div class="empty-state">Sin video asignado.</div>'}
      <div class="grid-3" style="margin-top:16px;">
        ${isCardio ? `
          <div class="kpi-tile"><div class="val">${ex.duration || '-'}</div><div class="lbl">Duración</div></div>
          <div class="kpi-tile"><div class="val">${ex.rest_time || '-'}</div><div class="lbl">Descanso</div></div>
        ` : `
          <div class="kpi-tile"><div class="val">${ex.series ?? '-'}</div><div class="lbl">Series</div></div>
          <div class="kpi-tile"><div class="val">${ex.reps || '-'}</div><div class="lbl">Repeticiones</div></div>
          <div class="kpi-tile"><div class="val">${ex.rest_time || '-'}</div><div class="lbl">Descanso</div></div>
        `}
      </div>
      ${ex.description ? `<p style="margin-top:16px;">${ex.description}</p>` : ''}
      <div id="training-duration-panel"></div>
      <div id="training-rest-panel"></div>
      ${isLast && done ? `<div class="empty-state" style="margin-top:16px;">Completaste ${CATEGORY_LABELS[category]} del Día ${day}.</div>` : ''}
      <div style="display:flex;justify-content:space-between;gap:8px;margin-top:20px;">
        <button class="btn btn-ghost" style="width:auto" ${trainingUI.index === 0 ? 'disabled style="opacity:.4"' : ''} onclick="trainingGoTo(${trainingUI.index - 1})">Anterior</button>
        ${done
          ? '<button class="btn btn-ghost" style="width:auto" disabled>Completado ✓</button>'
          : isCardio
            ? `<button class="btn btn-primary" style="width:auto" onclick="startCardioDuration('${ex.id}')">Medir duración</button>`
            : `<button class="btn btn-primary" style="width:auto" onclick="markExerciseComplete('${ex.id}')">Marcar completado</button>`}
        ${isLast && done
          ? `<button class="btn btn-primary" style="width:auto" onclick="backToTrainingDay()">Finalizar</button>`
          : `<button class="btn btn-ghost" style="width:auto" ${isLast ? 'disabled style="opacity:.4"' : ''} onclick="trainingGoTo(${trainingUI.index + 1})">Siguiente</button>`}
      </div>
    </div>
  `;
  window._trainingTimer = null;
}

function markExerciseComplete(exId) {
  trainingUI.completed[exId] = true;
  const list = getCurrentTrainingList();
  const ex = list[trainingUI.index];
  startTrainingRestTimer(parseTimeToSeconds(ex && ex.rest_time));
}

function startCardioDuration(exId) {
  stopCardioTimer();
  const list = getCurrentTrainingList();
  const ex = list[trainingUI.index];
  let remaining = parseTimeToSeconds(ex && ex.duration);
  const panel = document.getElementById('training-duration-panel');
  if (!panel) return;
  const draw = () => {
    panel.innerHTML = `
      <div style="margin-top:16px;padding:16px;background:var(--sage-soft);border-radius:14px;text-align:center;">
        <div style="font-size:12px;color:var(--ink-soft);font-weight:600;text-transform:uppercase;letter-spacing:.05em;">Duración</div>
        <div style="font-size:34px;font-weight:700;color:var(--sage);margin:4px 0;">${formatSeconds(remaining)}</div>
        <button class="btn btn-ghost" style="width:auto" onclick="stopCardioDuration('${exId}')">Terminar</button>
      </div>
    `;
  };
  draw();
  window._cardioTimer = setInterval(() => {
    remaining -= 1;
    if (remaining <= 0) { stopCardioDuration(exId); return; }
    draw();
  }, 1000);
}
function stopCardioTimer() {
  if (window._cardioTimer) { clearInterval(window._cardioTimer); window._cardioTimer = null; }
  const panel = document.getElementById('training-duration-panel');
  if (panel) panel.innerHTML = '';
}
function stopCardioDuration(exId) {
  stopCardioTimer();
  markExerciseComplete(exId);
}

function startTrainingRestTimer(seconds) {
  stopTrainingRestTimer();
  let remaining = seconds;
  const panel = document.getElementById('training-rest-panel');
  if (!panel) return;
  const draw = () => {
    panel.innerHTML = `
      <div style="margin-top:16px;padding:16px;background:var(--terracota-soft);border-radius:14px;text-align:center;">
        <div style="font-size:12px;color:var(--ink-soft);font-weight:600;text-transform:uppercase;letter-spacing:.05em;">Descanso</div>
        <div style="font-size:34px;font-weight:700;color:var(--terracota);margin:4px 0;">${formatSeconds(remaining)}</div>
        <button class="btn btn-ghost" style="width:auto" onclick="skipTrainingRest()">Saltar descanso</button>
      </div>
    `;
  };
  draw();
  window._trainingTimer = setInterval(() => {
    remaining -= 1;
    if (remaining <= 0) { skipTrainingRest(); return; }
    draw();
  }, 1000);
}
function stopTrainingRestTimer() {
  if (window._trainingTimer) { clearInterval(window._trainingTimer); window._trainingTimer = null; }
  const panel = document.getElementById('training-rest-panel');
  if (panel) panel.innerHTML = '';
}
function skipTrainingRest() {
  stopTrainingRestTimer();
  const list = getCurrentTrainingList();
  if (trainingUI.index < list.length - 1) trainingGoTo(trainingUI.index + 1);
  else renderMain();
}
function trainingGoTo(index) {
  const list = getCurrentTrainingList();
  if (index < 0 || index >= list.length) return;
  stopTrainingRestTimer();
  stopCardioTimer();
  trainingUI.index = index;
  renderMain();
}
function openTrainingDay(day) { trainingUI = { day, category: null, index: 0, completed: trainingUI.completed, lastCategory: null }; renderMain(); }
function startTodaySession(day, category, exId) {
  if (!category) return;
  const list = (window._trainingExercises || []).filter(x => x.day_number === day && x.category === category);
  const idx = exId ? list.findIndex(x => x.id === exId) : 0;
  trainingUI = { day, category, index: idx >= 0 ? idx : 0, completed: trainingUI.completed };
  renderMain();
}
function openTrainingCategory(category) { trainingUI.category = category; trainingUI.lastCategory = category; trainingUI.index = 0; renderMain(); }
function backToTrainingHome() { stopTrainingRestTimer(); stopCardioTimer(); trainingUI = { day: null, category: null, index: 0, completed: {}, lastCategory: null }; renderMain(); }
function backToTrainingDay() { stopTrainingRestTimer(); stopCardioTimer(); trainingUI.category = null; trainingUI.index = 0; renderMain(); }

async function saveTrainingConfig() {
  const clientId = currentClientId();
  if (!clientId) return alert('Selecciona un cliente primero.');
  const days = document.getElementById('tr-training-days').value;
  const quoteId = document.getElementById('tr-assigned-quote').value;
  try {
    if (days) await api(`/api/clients/${clientId}/training-days`, { method: 'PATCH', body: JSON.stringify({ training_days: parseInt(days, 10) }) });
    await api(`/api/clients/${clientId}/assigned-quote`, { method: 'PATCH', body: JSON.stringify({ quote_id: quoteId || null }) });
    renderMain();
  } catch (e) { alert('Error: ' + e.message); }

async function createExercise() {
  const clientId = currentClientId();
  if (!clientId) return alert('Selecciona un cliente primero.');
  const title = document.getElementById('ex-title').value.trim();
  if (!title) return alert('Escribe un título.');
  const payload = {
    title,
    day_number: parseInt(document.getElementById('ex-day').value, 10),
    category: document.getElementById('ex-category').value,
    series: document.getElementById('ex-series').value,
    reps: document.getElementById('ex-reps').value,
    duration: document.getElementById('ex-duration').value,
    rest_time: document.getElementById('ex-rest').value,
    youtube_url: document.getElementById('ex-youtube').value,
    description: document.getElementById('ex-desc').value,
  };
  try {
    await api(`/api/clients/${clientId}/exercises`, { method: 'POST', body: JSON.stringify(payload) });

    } else renderMain();

async function deleteExercise(id) {
  const clientId = currentClientId();
  try {
    await api(`/api/clients/${clientId}/exercises/${id}`, { method: 'DELETE' });
    if (document.getElementById('training-exercises-by-day')) await refetchTrainingExercisesByDay();
    else renderMain();
  } catch (e) { alert('Error: ' + e.message); }
}

function printAsPdf(title, bodyHtml) {
  const w = window.open('', '_blank');
  if (!w) { alert('Habilita las ventanas emergentes para descargar el PDF.'); return; }
  w.document.write(`<html><head><title>${title}</title><style>body{font-family:sans-serif;padding:24px;color:#222}h1{font-size:20px}table{width:100%;border-collapse:collapse;margin-top:12px}td,th{padding:8px;border:1px solid #ccc;text-align:left}</style></head><body><h1>${title}</h1>${bodyHtml}</body></html>`);
  w.document.close();
  w.focus();
  w.print();
}

async function saveNutritionPlan() {
  const clientId = currentClientId();
  if (!clientId) return alert('Selecciona un cliente primero.');
  const menu_plan = (nutritionUI.menuDraft || [])
    .filter(m => m.name.trim())
    .map(m => ({
      name: m.name.trim(),
      options: [
        { label: 'Opción 1', items: m.opt1.split('\n').map(s => s.trim()).filter(Boolean) },
        { label: 'Opción 2', items: m.opt2.split('\n').map(s => s.trim()).filter(Boolean) },
      ],
    }));
  const draft = nutritionUI.planDraft || {};
  const payload = {
    daily_cals: draft.daily_cals || 0,
    protein_g: draft.protein_g || 0,
    carbs_g: draft.carbs_g || 0,
    fat_g: draft.fat_g || 0,
    summary: draft.summary || '',
    menu_plan,
    recommendations: (draft.recommendations || '').split('\n').map(s => s.trim()).filter(Boolean),
    closing_message: draft.closing_message || '',
  };
  const supplementRows = (nutritionUI.supplementsDraft || []).filter(s => s.name.trim());
  const deletedSupplementIds = nutritionUI.deletedSupplementIds || [];
  try {
    await api(`/api/clients/${clientId}/nutrition`, { method: 'PUT', body: JSON.stringify(payload) });
    for (const id of deletedSupplementIds) {
      await api(`/api/clients/${clientId}/supplements/${id}`, { method: 'DELETE' });
    }
    for (const s of supplementRows) {
      const body = { name: s.name.trim(), brand: s.brand, dose: s.dose, timing: s.timing };
      if (s.id) await api(`/api/clients/${clientId}/supplements/${s.id}`, { method: 'PUT', body: JSON.stringify(body) });
      else await api(`/api/clients/${clientId}/supplements`, { method: 'POST', body: JSON.stringify(body) });
    }
    nutritionUI.menuDraft = null;
    nutritionUI.planDraft = null;
    nutritionUI.supplementsDraft = null;
    nutritionUI.deletedSupplementIds = null;
    renderMain();
  } catch (e) { alert('Error: ' + e.message); }
}

      api(`/api/clients/${clientId}/cortisol-checkin`).catch(() => ({ checkin: null })),

      const haveTitles = new Set(techniques.map(t => (t.title || '').trim().toLowerCase()));
      const missing = DEFAULT_CORTISOL_TECHNIQUES.filter(d => !haveTitles.has(d.title.toLowerCase()));
      if (missing.length) {
        await Promise.all(missing.map(d => api(`/api/clients/${clientId}/cortisol-techniques`, { method: 'POST', body: JSON.stringify(d) }).catch(() => null)));
        techniques = (await api(`/api/clients/${clientId}/cortisol-techniques`)).techniques;
      }
    }
    const completions = completionsRes.completions || [];
    const checkin = checkinRes.checkin || null;
    const tip = tipRes.tip || null;
    let adminTips = [];
    if (isAdmin) adminTips = (await api('/api/admin/cortisol-tips').catch(() => ({ tips: [] }))).tips || [];
    if (cortisolUI.activeId) {
      const active = techniques.find(t => t.id === cortisolUI.activeId);
      if (active) return renderCortisolPlayer(el, active, completions, isAdmin);
      cortisolUI.activeId = null;
    }
    return renderCortisolHome(el, techniques, isAdmin, completions, checkin, tip, adminTips);
  } catch (e) { el.innerHTML = `<div class="error-msg">${e.message}</div>`; }
}

function calculateCortisolWeeklyStats(completions) {
  const weekStart = getWeekStart();
  const count = new Set(completions.filter(c => c.completed_date >= weekStart).map(c => c.completed_date)).size;
  const pct = Math.round((count / 7) * 100);
  return { count, pct };
}

function startRestToolTimer(id, minutes, seconds) {
  stopRestToolTimer();

  const panel = document.getElementById('rest-tool-panel');
  if (!panel) return;

  const totalSeconds = (Number(minutes) || 0) * 60 + (Number(seconds) || 0);
  const hasCountdown = totalSeconds > 0;
  let secondsLeft = totalSeconds;
  const paint = () => {
    panel.innerHTML = `<div class="card" style="background:#F1EAF7;border:none;text-align:center;">
      ${hasCountdown
        ? `<p style="font-family:'Fraunces',serif;font-size:22px;font-weight:700;color:#8A5FA0;margin:0 0 8px;">${Math.floor(secondsLeft / 60)}:${String(secondsLeft % 60).padStart(2, '0')}</p>`

    </div>`;
  };
  paint();
  if (hasCountdown) {
    window._restToolInterval = setInterval(() => {
      secondsLeft--;
      if (secondsLeft <= 0) { stopRestToolTimer(); return; }
      paint();
    }, 1000);
  }

// Formato de fecha/hora legible para eventos: "21 jul, 10:21am" — nunca el
// timestamp crudo de la base de datos. Se usa en cualquier parte de la app
// donde se muestre fecha/hora de un evento (hero, tarjeta, listas).
function formatEventDateTime(dateStr) {
  if (!dateStr) return '-';
  const d = new Date(dateStr);
  if (isNaN(d.getTime())) return '-';
  const MONTHS = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  let h = d.getHours();
  const ampm = h >= 12 ? 'pm' : 'am';
  h = h % 12; if (h === 0) h = 12;
  const min = String(d.getMinutes()).padStart(2, '0');
  return `${d.getDate()} ${MONTHS[d.getMonth()]}, ${h}:${min}${ampm}`;
}

  if (/circuito|entrena|fuerza|cardio|running|correr|hiit/.test(t)) return '🏃';
  if (/sauna|calor/.test(t)) return '🔥';
  if (/comunidad|social|cena|desayuno|brunch/.test(t)) return '🤝';

}

// Gráfica de evolución con SVG a mano (no hay React/recharts en este
// proyecto — es Express + JS vanilla). Cada línea se normaliza dentro de su
// propio rango para que las pendientes se lean bien aunque las escalas de
// peso/grasa/masa muscular sean muy distintas; la leyenda muestra el valor
// real más reciente de cada una.
function renderEvolutionLineChart(containerId, series) {
  const container = document.getElementById(containerId);
  if (!container) return;
  const allMonths = Array.from(new Set(series.flatMap(s => s.points.map(p => p.month)))).sort((a, b) => a - b).slice(-6);
  if (!allMonths.length) { container.innerHTML = '<div class="empty-state">Sin datos suficientes.</div>'; return; }
  const w = 320, h = 150, padL = 8, padR = 8, padT = 12, padB = 20;
  const xStep = allMonths.length > 1 ? (w - padL - padR) / (allMonths.length - 1) : 0;
  const xFor = (month) => padL + xStep * allMonths.indexOf(month);
  const pathsSvg = series.map(s => {
    const pts = allMonths.map(m => s.points.find(p => p.month === m)).filter(Boolean);
    if (!pts.length) return '';
    const values = pts.map(p => p.value);
    const min = Math.min(...values), max = Math.max(...values);
    const range = (max - min) || 1;
    const yFor = (v) => (h - padB) - ((v - min) / range) * (h - padT - padB);
    const d = pts.map((p, i) => `${i === 0 ? 'M' : 'L'} ${xFor(p.month).toFixed(1)} ${yFor(p.value).toFixed(1)}`).join(' ');
    const dots = pts.map(p => `<circle cx="${xFor(p.month).toFixed(1)}" cy="${yFor(p.value).toFixed(1)}" r="3" fill="${s.color}"/>`).join('');
    return `<path d="${d}" fill="none" stroke="${s.color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>${dots}`;
  }).join('');
  const xLabels = allMonths.map(m => `<text x="${xFor(m).toFixed(1)}" y="${h - 4}" font-size="8" text-anchor="middle" fill="#8A8377">M${m}</text>`).join('');
  container.innerHTML = `
    <svg viewBox="0 0 ${w} ${h}" width="100%" style="overflow:visible;">${pathsSvg}${xLabels}</svg>
    <div style="display:flex;gap:16px;margin-top:10px;flex-wrap:wrap;">
      ${series.map(s => {
        const pts = allMonths.map(m => s.points.find(p => p.month === m)).filter(Boolean);
        const latest = pts.length ? pts[pts.length - 1].value : null;
        return `<div style="display:flex;align-items:center;gap:6px;font-size:11px;color:#8A8377;">
          <span style="width:8px;height:8px;border-radius:50%;background:${s.color};display:inline-block;"></span>
          ${s.name}: <strong style="color:#2B2621;">${latest != null ? latest + (s.unit || '') : '—'}</strong>
        </div>`;
      }).join('')}
    </div>
  `;
}

function calculateAge(birthdate) {
  if (!birthdate) return null;
  const b = new Date(birthdate + 'T00:00:00');
  if (isNaN(b.getTime())) return null;
  const today = new Date();
  let age = today.getFullYear() - b.getFullYear();
  const m = today.getMonth() - b.getMonth();
  if (m < 0 || (m === 0 && today.getDate() < b.getDate())) age--;
  return age;
}

            <button class="accordion-header" type="button" onclick="toggleAccordion(this)">
              Nueva frase
              <span class="accordion-toggle">Ver</span>
            </button>
            <div class="accordion-content">
              <div class="field"><label>Frase</label><textarea id="qt-new-quote" rows="2" placeholder="Ej: Estoy trabajando en mi cuerpo con amor y disciplina"></textarea></div>
              <div class="field" style="max-width:280px;"><label>Autor (opcional)</label><input id="qt-new-author"></div>
              <button class="btn btn-primary" style="width:auto" onclick="createQuote()">Agregar</button>
            </div>
          </div>
          ${renderQuotesLibraryCard(quotes)}
        </div>
      </div>
    `;
  } catch (e) { el.innerHTML = `<div class="error-msg">${e.message}</div>`; }
}
function toggleEditQuote(id) {
  quotesUI.editingId = id;
  const container = document.getElementById('quotes-library-card');
  if (container) container.outerHTML = renderQuotesLibraryCard(window._adminQuotes || []);
}
function toggleQuotesLibraryAccordion() {
  quotesUI.libraryOpen = !quotesUI.libraryOpen;
  const container = document.getElementById('quotes-library-card');
  if (container) container.outerHTML = renderQuotesLibraryCard(window._adminQuotes || []);
}
async function refetchAdminQuotes() {
  const container = document.getElementById('quotes-library-card');
  if (!container) return;
  const { quotes } = await api('/api/admin/quotes');
  state.quotes = quotes;
  window._adminQuotes = quotes;
  container.outerHTML = renderQuotesLibraryCard(quotes);
}
async function updateQuote(id) {
  const quote = document.getElementById(`qt-edit-quote-${id}`).value.trim();
  const author = document.getElementById(`qt-edit-author-${id}`).value.trim();
  if (!quote) return alert('Escribe una frase.');
  try {
    await api(`/api/admin/quotes/${id}`, { method: 'PATCH', body: JSON.stringify({ quote, author: author || null }) });
    quotesUI.editingId = null;
    await refetchAdminQuotes();
  } catch (e) { alert('Error: ' + e.message); }
}
async function createQuote() {
  const quote = document.getElementById('qt-new-quote').value.trim();
  const author = document.getElementById('qt-new-author').value.trim();
  if (!quote) return alert('Escribe una frase.');
  try {
    await api('/api/admin/quotes', { method: 'POST', body: JSON.stringify({ quote, author: author || null }) });
    if (document.getElementById('quotes-library-card')) {
      document.getElementById('qt-new-quote').value = '';
      document.getElementById('qt-new-author').value = '';
      await refetchAdminQuotes();
    } else renderMain();
  } catch (e) { alert('Error: ' + e.message); }
}
async function deleteQuote(id) {
  if (!confirm('¿Eliminar esta frase?')) return;
  try {
    await api(`/api/admin/quotes/${id}`, { method: 'DELETE' });
    if (document.getElementById('quotes-library-card')) await refetchAdminQuotes();
    else renderMain();
  } catch (e) { alert('Error: ' + e.message); }
}

let adminCommunityPreviewType = 'coaching_1_1';
function setAdminCommunityPreviewType(t) { adminCommunityPreviewType = t; renderMain(); }

let adminCommunityTab = 'gestion';
function setAdminCommunityTab(t) { adminCommunityTab = t; renderMain(); }

let adminCommunityNewType = 'event';
function setAdminCommunityNewType(t) { adminCommunityNewType = t; renderMain(); }

async function renderAdminCommunity(el) {
  if (adminCommunityTab === 'reservas') return renderAdminCommunityReservations(el);
  try {
    const [{ events }, { therapies }] = await Promise.all([api('/api/community/events'), api('/api/community/therapies')]);
    const previewUnlocked = adminCommunityPreviewType !== 'lead_wellness';
    const previewTherapiesHtml = previewUnlocked
      ? (therapies.length ? therapies.map(t => renderTherapyRow(t, true)).join('') : '<div class="empty-state">Sin terapias publicadas.</div>')
      : renderLockedOverlay(
          therapies.length ? therapies.slice(0, 3).map(t => renderTherapyRow(t, false)).join('') : '<div class="empty-state">Sin terapias publicadas.</div>',
          {
            title: 'Beneficios solo para clientes activos',
            subtitle: 'Activa un plan de Coaching con tu mentor para desbloquear descuentos reales en spa, terapia, fisioterapia y más.',
            ctaLabel: 'Hablar con un coach',
            ctaStyle: 'background:#2B2621;color:#F3EFE6;',
            ctaAction: 'openWhatsappCta()',
          }
        );
    el.innerHTML = `
      <div class="page-header"><h2>Comunidad — Administración</h2><p>Publica eventos y terapias disponibles.</p></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;">
        <button class="btn ${adminCommunityTab==='gestion'?'btn-primary':'btn-ghost'}" style="width:auto" onclick="setAdminCommunityTab('gestion')">Gestión</button>
        <button class="btn ${adminCommunityTab==='reservas'?'btn-primary':'btn-ghost'}" style="width:auto" onclick="setAdminCommunityTab('reservas')">Reservas</button>
      </div>
      <div class="card">
        <div class="card-title">Crear nuevo</div>
        <div class="segmented-group" style="max-width:280px;margin-bottom:16px;">
          <button type="button" class="segmented-cell ${adminCommunityNewType==='event'?'selected':''}" onclick="setAdminCommunityNewType('event')">Evento</button>
          <button type="button" class="segmented-cell ${adminCommunityNewType==='therapy'?'selected':''}" onclick="setAdminCommunityNewType('therapy')">Terapia</button>
        </div>
        ${adminCommunityNewType === 'event' ? `
          <div class="grid-3">
            <div class="field"><label>Título</label><input id="ev-new-title"></div>
            <div class="field"><label>Fecha</label><input type="datetime-local" id="ev-new-date"></div>
            <div class="field"><label>Lugar</label><input id="ev-new-location"></div>
          </div>
          <div class="field"><label>Descripción</label><textarea id="ev-new-desc" rows="2"></textarea></div>
          <button class="btn btn-primary" style="width:auto" onclick="createCommunityEvent()">Crear evento</button>
        ` : `
          <div class="grid-3">
            <div class="field"><label>Título</label><input id="th-new-title"></div>
            <div class="field"><label>Proveedor</label><input id="th-new-provider"></div>
            <div class="field"><label>Descuento (%)</label><input type="number" id="th-new-discount"></div>
          </div>
          <div class="field"><label>Descripción</label><textarea id="th-new-desc" rows="2"></textarea></div>
          <button class="btn btn-primary" style="width:auto" onclick="createTherapy()">Crear terapia</button>
        `}
      </div>
      <div class="card">
        <div class="card-title">Eventos publicados</div>
        ${events.map(e => `
          <div class="list-row" style="${e.active === false ? 'opacity:.5;' : ''}">
            <div><strong>${e.title}</strong><div style="font-size:12px;color:var(--ink-soft);margin-top:2px;">${e.event_date ? formatEventDateTime(e.event_date) : 'Sin fecha'}${e.location ? ' · ' + e.location : ''}</div></div>
            <div style="display:flex;gap:8px;">
              <button class="small-btn" onclick="toggleEventActive('${e.id}', ${e.active === false})">${e.active === false ? 'Activar' : 'Desactivar'}</button>
              <button class="small-btn" onclick="deleteEvent('${e.id}')">Eliminar</button>
            </div>
          </div>`).join('') || '<div class="empty-state">Sin eventos.</div>'}
      </div>
      <div class="card">
        <div class="card-title">Terapias publicadas</div>
        ${therapies.map(t => `
          <div class="list-row" style="${t.active === false ? 'opacity:.5;' : ''}">
            <div><strong>${t.title}</strong>${t.discount_pct ? ` <span class="badge">-${t.discount_pct}%</span>` : ''}<div style="font-size:12px;color:var(--ink-soft);margin-top:2px;">${t.provider || ''}</div></div>
            <div style="display:flex;gap:8px;">
              <button class="small-btn" onclick="toggleTherapyActive('${t.id}', ${t.active === false})">${t.active === false ? 'Activar' : 'Desactivar'}</button>
              <button class="small-btn" onclick="deleteTherapy('${t.id}')">Eliminar</button>
            </div>
          </div>`).join('') || '<div class="empty-state">Sin terapias.</div>'}
      </div>
      <div class="card">
        <div class="card-title">Vista previa por tipo de cliente</div>
        <p style="font-size:13px;color:var(--ink-soft);margin:-8px 0 14px;">Eventos se ve igual para los 3 tipos, así que no cambia aquí. Esto es exactamente lo que un cliente vería hoy en la pestaña Terapias, según su tipo — sin necesidad de entrar con otra cuenta.</p>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;">
          <button class="btn ${adminCommunityPreviewType==='coaching_1_1'?'btn-primary':'btn-ghost'}" style="width:auto" onclick="setAdminCommunityPreviewType('coaching_1_1')">Coaching 1:1</button>
          <button class="btn ${adminCommunityPreviewType==='coaching_online'?'btn-primary':'btn-ghost'}" style="width:auto" onclick="setAdminCommunityPreviewType('coaching_online')">Coaching Online</button>
          <button class="btn ${adminCommunityPreviewType==='lead_wellness'?'btn-primary':'btn-ghost'}" style="width:auto" onclick="setAdminCommunityPreviewType('lead_wellness')">Lead Wellness</button>
        </div>
        ${previewTherapiesHtml}
      </div>
    `;
  } catch (e) { el.innerHTML = `<div class="error-msg">${e.message}</div>`; }
}
async function renderAdminCommunityReservations(el) {
  try {
    const { eventReservations, therapyReservations } = await api('/api/community/reservations');

    const groupBy = (rows, idKey) => {
      const groups = new Map();
      rows.forEach((r) => {
        const key = r[idKey] || 'sin-id';
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(r);
      });
      return Array.from(groups.values());
    };

    const eventGroups = groupBy(eventReservations, 'eventId');
    const therapyGroups = groupBy(therapyReservations, 'therapyId');

    const renderPersonRow = (name, phone) => `
      <div class="list-row">
        <div><strong>${name}</strong></div>
        <div style="color:var(--ink-soft);font-size:13px;">${phone || 'Sin celular registrado'}</div>
      </div>`;

    const eventAccordionHtml = eventGroups.length
      ? eventGroups.map((group) => {
          const first = group[0];
          const dateLabel = first.eventDate ? formatEventDateTime(first.eventDate) : 'Sin fecha';
          return `
            <div class="accordion-item">
              <button class="accordion-header" type="button" onclick="toggleAccordion(this)">
                ${first.eventTitle} <span style="color:var(--ink-soft);font-weight:400;">— ${group.length} reserva${group.length === 1 ? '' : 's'}</span>
                <span class="accordion-toggle">Ver</span>
              </button>
              <div class="accordion-content">
                <div style="font-size:13px;color:var(--ink-soft);margin-bottom:10px;">${dateLabel}${first.eventLocation ? ' · ' + first.eventLocation : ''}</div>
                ${group.map((r) => renderPersonRow(r.clientName, r.clientPhone)).join('')}
              </div>
            </div>`;
        }).join('')
      : '<div class="empty-state">Sin reservas de eventos.</div>';

    const therapyAccordionHtml = therapyGroups.length
      ? therapyGroups.map((group) => {
          const first = group[0];
          return `
            <div class="accordion-item">
              <button class="accordion-header" type="button" onclick="toggleAccordion(this)">
                ${first.therapyTitle} <span style="color:var(--ink-soft);font-weight:400;">— ${group.length} reserva${group.length === 1 ? '' : 's'}</span>
                <span class="accordion-toggle">Ver</span>
              </button>
              <div class="accordion-content">
                <div style="font-size:13px;color:var(--ink-soft);margin-bottom:10px;">${first.therapyProvider || ''}${first.therapyDiscountPct ? ' · -' + first.therapyDiscountPct + '%' : ''}</div>
                ${group.map((r) => renderPersonRow(r.clientName, r.clientPhone)).join('')}
              </div>
            </div>`;
        }).join('')
      : '<div class="empty-state">Sin reservas de terapias.</div>';

    el.innerHTML = `
      <div class="page-header"><h2>Comunidad — Administración</h2><p>Reservas de eventos y terapias.</p></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;">
        <button class="btn ${adminCommunityTab==='gestion'?'btn-primary':'btn-ghost'}" style="width:auto" onclick="setAdminCommunityTab('gestion')">Gestión</button>
        <button class="btn ${adminCommunityTab==='reservas'?'btn-primary':'btn-ghost'}" style="width:auto" onclick="setAdminCommunityTab('reservas')">Reservas</button>
      </div>
      <div class="card">
        <div class="card-title">Reservas de Eventos</div>
        <div class="accordion">${eventAccordionHtml}</div>
      </div>
      <div class="card">
        <div class="card-title">Reservas de Terapias</div>
        <div class="accordion">${therapyAccordionHtml}</div>
      </div>
    `;
  } catch (e) { el.innerHTML = `<div class="error-msg">${e.message}</div>`; }
}
async function createCommunityEvent() {
  const payload = {
    title: document.getElementById('ev-new-title').value,
    event_date: document.getElementById('ev-new-date').value || null,
    location: document.getElementById('ev-new-location').value,
    description: document.getElementById('ev-new-desc').value,
  };
  try { await api('/api/community/events', { method: 'POST', body: JSON.stringify(payload) }); renderMain(); }
  catch (e) { alert('Error: ' + e.message); }
}
async function toggleEventActive(id, active) {
  try { await api(`/api/community/events/${id}`, { method: 'PUT', body: JSON.stringify({ active }) }); renderMain(); }
  catch (e) { alert('Error: ' + e.message); }
}
async function deleteEvent(id) {
  try { await api(`/api/community/events/${id}`, { method: 'DELETE' }); renderMain(); }
  catch (e) { alert('Error: ' + e.message); }
}
async function createTherapy() {
  const payload = {
    title: document.getElementById('th-new-title').value,
    provider: document.getElementById('th-new-provider').value,
    discount_pct: document.getElementById('th-new-discount').value || 0,
    description: document.getElementById('th-new-desc').value,
  };
  try { await api('/api/community/therapies', { method: 'POST', body: JSON.stringify(payload) }); renderMain(); }
  catch (e) { alert('Error: ' + e.message); }
}
async function toggleTherapyActive(id, active) {
  try { await api(`/api/community/therapies/${id}`, { method: 'PUT', body: JSON.stringify({ active }) }); renderMain(); }
  catch (e) { alert('Error: ' + e.message); }
}
async function deleteTherapy(id) {
  try { await api(`/api/community/therapies/${id}`, { method: 'DELETE' }); renderMain(); }
  catch (e) { alert('Error: ' + e.message); }
}
